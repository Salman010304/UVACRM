<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Udaan Vibrant Academy ERP</title>
    
    <!-- PWA Manifest & iOS Apple Touch Icon Links -->
    <link id="manifest-link" rel="manifest">
    <link id="apple-icon" rel="apple-touch-icon">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- html2pdf.js for High-Fidelity PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Google Fonts for Premium Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* --- Attractive Lines Animated Background --- */
        .bg-mesh {
            background-color: #020617;
            background-image: radial-gradient(rgba(249, 115, 22, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: floatOrb 12s ease-in-out infinite alternate;
        }
        .orb-orange { width: 400px; height: 400px; background: #ea580c; top: -100px; left: -100px; }
        .orb-purple { width: 500px; height: 500px; background: #7e22ce; bottom: -150px; right: -100px; animation-delay: -6s; }
        @keyframes floatOrb {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(60px) scale(1.15); }
        }

        /* Custom scrollbar for webkit to make tables look clean */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: white !important; width: 794px !important; min-width: 794px !important; margin: 0 auto !important; padding: 0 !important; }
            .print\:hidden { display: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:overflow-visible { overflow: visible !important; }
            .print\:bg-white { background-color: white !important; }
            /* Reset mobile margins for print */
            main { margin-bottom: 0 !important; overflow: visible !important; }
            .a4-wrapper { overflow: visible !important; padding: 0 !important; margin: 0 !important; }
            .a4-document { margin: 0 !important; border: none !important; box-shadow: none !important; }
        }

        :root {
            --doc-scale: 1;
        }

        @media screen and (max-width: 820px) {
            .mobile-scale-target {
                zoom: var(--doc-scale);
            }
            /* Firefox fallback for zoom */
            @-moz-document url-prefix() {
                .mobile-scale-target {
                    transform: scale(var(--doc-scale));
                    transform-origin: top center;
                }
                .a4-wrapper {
                    height: calc(1123px * var(--doc-scale) + 40px);
                    overflow: hidden;
                    align-items: flex-start;
                }
            }
        }

        /* --- Premium A4 Document Styles --- */
        .a4-wrapper {
            width: 100%;
            overflow-x: auto;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }
        .a4-document {
            width: 794px !important; /* Exact A4 width at 96dpi */
            min-width: 794px !important;
            max-width: 794px !important;
            height: 1123px !important; /* Exact A4 height at 96dpi */
            min-height: 1123px !important;
            max-height: 1123px !important;
            background-color: white;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            overflow: hidden;
            box-sizing: border-box;
        }
        .pdf-label {
            font-size: 0.55rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.15rem;
        }
        .pdf-value {
            font-size: 0.75rem;
            font-weight: 800;
            color: #0f172a;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 0.2rem;
            min-height: 18px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .watermark-logo {
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.04; 
            pointer-events: none;
            width: 500px; 
            height: 500px;
            object-fit: contain;
            z-index: 0;
            filter: grayscale(100%);
        }
    </style>
</head>
<body class="text-slate-800 bg-slate-50 font-sans h-[100dvh] overflow-hidden">
    
    <!-- Initial Failsafe Loader to prevent Blank White Screens -->
    <div id="root" class="h-full">
        <div class="flex h-[100dvh] w-full items-center justify-center bg-slate-900 text-white">
            <div class="animate-pulse flex flex-col items-center">
                <div class="w-16 h-16 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="font-bold tracking-widest text-slate-400">INITIALIZING SYSTEM...</p>
                <p class="text-xs text-slate-500 mt-2">Loading core modules...</p>
            </div>
        </div>
    </div>

    <!-- FIREBASE SDK (Compat version allows running directly from local file:// paths) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // --- DATABASE & RULES ---
        const SKILL_COURSES = {
            "AI Master Combo": { duration: "1 Month" },
            "Prompt Engineering Mastery": { duration: "1 Month" },
            "AI Content Creation Mastery": { duration: "1 Month" },
            "AI Productivity & Smart Work": { duration: "1 Month" },
            "AI Career Skills Program": { duration: "1 Month+" },
            "Career Starter Pack (Comp+Eng+Excel)": { duration: "3 Months" },
            "Creative Designing Course": { duration: "2 Months" },
            "Advanced Excel Mastery": { duration: "2 Months" },
            "Accounting & Tally Prime": { duration: "2 Months" },
            "Smart Computer Skills": { duration: "2 Months" },
            "English Communication Mastery": { duration: "2 Months" },
            "Presentation Skills Mastery": { duration: "2 Months" }
        };

        const TUITION_CLASSES = [
            "STD 9", "STD 10", "STD 11 Commerce", "STD 12 Commerce"
        ];

        const LEAD_SOURCES = ["Flyer", "Instagram", "Banner", "Reference", "Walk-in", "Other"];

        const defaultAppIcon = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><rect width='200' height='200' rx='40' fill='%23ea580c'/><text x='100' y='115' font-family='Arial' font-size='70' font-weight='900' fill='%23ffffff' text-anchor='middle'>UVA</text><text x='100' y='150' font-family='Arial' font-size='18' font-weight='bold' fill='%23ffffff' text-anchor='middle' letter-spacing='3'>APP</text></svg>";
        const defaultFormLogo = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><rect width='200' height='200' rx='30' fill='%230f172a'/><text x='100' y='110' font-family='Arial' font-size='65' font-weight='900' fill='%23f97316' text-anchor='middle'>UVA</text><text x='100' y='145' font-family='Arial' font-size='16' font-weight='normal' fill='%23ffffff' text-anchor='middle' letter-spacing='2'>ACADEMY</text></svg>";

        // --- GLOBAL STATE ---
        const state = {
            isAuthLoading: true,
            user: null,
            loginError: '',
            activeTab: 'dashboard',
            appIconUrl: defaultAppIcon,
            formLogoUrl: defaultFormLogo,
            formLogoSize: 80,
            adminSignUrl: null, 
            viewingImage: null,
            inquiries: [],
            students: [],
            showNewInquiryForm: false,
            newInquiryData: { name: '', phone: '', type: 'Skill', course: '', std: '', board: '', medium: '', source: 'Flyer', inquiryDate: new Date().toISOString().split('T')[0] },
            enrollingLead: null,
            receiptData: null,
            attendanceReportData: null,
            individualReportData: null,
            waModalConfig: null,
            attFilterCategory: 'All',
            attSelectedBatch: '',
            attDate: new Date().toISOString().split('T')[0],
            attReportMonth: new Date().toISOString().slice(0, 7),
            attState: {}, // Structure: { 'YYYY-MM-DD': { 'UVA-123': { status: 'Present', reason: '' } } }
            admSearchQuery: '',
            admProgramFilter: 'All',
            admCourseFilter: 'All',
            admOfferFilter: 'All',
            canInstall: false,
            editingInquiryId: null,
            editingStudentData: null
        };

        let unsubSnapshot = null;
        let app, auth, db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'uva-erp';

        // --- SAFE RENDER ENGINE ---
        function render() {
            const root = document.getElementById('root');
            if (root) root.innerHTML = AppTemplate();
            if(window.lucide) lucide.createIcons();
            
            const mainContent = document.getElementById('main-scroll-area');
            if (mainContent && !state.receiptData && !state.attendanceReportData && !state.individualReportData) mainContent.scrollTop = 0;
            
            if(window.updateScale) window.updateScale();
        }

        window.updateScale = () => {
            if(window.innerWidth < 820) {
                const scale = (window.innerWidth - 32) / 794;
                document.documentElement.style.setProperty('--doc-scale', scale);
            } else {
                document.documentElement.style.setProperty('--doc-scale', '1');
            }
        };
        window.addEventListener('resize', window.updateScale);

        window.addEventListener('beforeprint', () => {
             document.documentElement.style.setProperty('--doc-scale', '1');
        });
        window.addEventListener('afterprint', () => {
             window.updateScale();
        });

        // Render immediately so the app shows the loader gracefully
        render();

        // FAILSAFE TIMEOUT: If Firebase takes longer than 4 seconds (blocked by host or offline), force login screen!
        setTimeout(() => {
            if (state.isAuthLoading) {
                state.isAuthLoading = false;
                state.loginError = "Network connection delayed. Please check your internet or use 'Bypass Login'.";
                render();
            }
        }, 4000);

        // --- BULLETPROOF FIREBASE INITIALIZATION ---
        try {
            let config = {
                apiKey: "AIzaSyDvwI0ImHdQhfyC1kchvg5APLdrvan6L54",
                authDomain: "uvacrm-b417f.firebaseapp.com",
                projectId: "uvacrm-b417f",
                storageBucket: "uvacrm-b417f.firebasestorage.app",
                messagingSenderId: "292694368608",
                appId: "1:292694368608:web:73248adec8a8150764fe05",
                measurementId: "G-C24RR5VWYV"
            };
            
            // Safely parse injected config if it exists
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                try { config = JSON.parse(__firebase_config); } catch(e) {}
            }

            app = firebase.initializeApp(config);
            auth = firebase.auth();
            db = firebase.firestore();

            auth.onAuthStateChanged(user => {
                state.isAuthLoading = false;
                state.user = user;
                if (user && user.uid !== 'bypassed_user') {
                    setupRealtimeSync(user.uid);
                } else if(user && user.uid === 'bypassed_user') {
                     window.loadDataFromCloud('bypassed_user');
                } else {
                    if (unsubSnapshot) { unsubSnapshot(); unsubSnapshot = null; }
                    render();
                }
            });

            // Handle Immersive Environment Tokens
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                auth.signInWithCustomToken(__initial_auth_token).catch(e => {
                    console.error("Auth Token Error:", e);
                    state.isAuthLoading = false; render();
                });
            }

        } catch (err) {
            console.error("Firebase Critical Error:", err);
            // If Firebase is completely blocked by browser, drop to offline mode smoothly
            state.isAuthLoading = false;
            state.loginError = "Firebase connection blocked by browser. Please use 'Bypass Login (Test Mode)'.";
            render();
        }

        // --- REAL-TIME SYNC ---
        function setupRealtimeSync(uid) {
             if (!db) return;
             
             // Using compat SDK syntax for firestore
             const docRef = db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('data').doc('erp_state');
             
             if (unsubSnapshot) unsubSnapshot(); 
             
             unsubSnapshot = docRef.onSnapshot((docSnap) => {
                 if (docSnap.exists) {
                     const data = docSnap.data();
                     state.appIconUrl = data.appIconUrl || defaultAppIcon;
                     state.formLogoUrl = data.formLogoUrl || defaultFormLogo;
                     state.formLogoSize = data.formLogoSize || 80;
                     state.adminSignUrl = data.adminSignUrl || null;
                     state.inquiries = data.inquiries || [];
                     state.students = data.students || [];
                     
                     // Safe sync for updated attendance format (checks if old format is present and migrates to today's date safely)
                     if (data.attState && Object.keys(data.attState).length > 0 && !Object.keys(data.attState)[0].includes('-')) {
                         state.attState = {};
                         state.attState[new Date().toISOString().split('T')[0]] = data.attState;
                     } else {
                         state.attState = data.attState || {};
                     }
                 }
                 render();
             }, (error) => {
                 console.error("Real-time sync error:", error);
             });
        }

        let syncTimeout;
        window.saveDataToCloud = async () => {
            const dataToSave = {
                appIconUrl: state.appIconUrl,
                formLogoUrl: state.formLogoUrl,
                formLogoSize: state.formLogoSize || 80,
                adminSignUrl: state.adminSignUrl || null,
                inquiries: state.inquiries,
                students: state.students,
                attState: state.attState
            };

            if (state.user && state.user.uid === 'bypassed_user') {
                localStorage.setItem('uva_erp_data', JSON.stringify(dataToSave));
                return;
            }

            if (!state.user || !db) return;

            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                try {
                    const docRef = db.collection('artifacts').doc(appId).collection('users').doc(state.user.uid).collection('data').doc('erp_state');
                    await docRef.set(dataToSave, { merge: true });
                } catch (e) {
                    console.error("Cloud Sync Failed", e);
                }
            }, 500);
        };

        window.loadDataFromCloud = async (uid) => {
            try {
                if (uid === 'bypassed_user') {
                    const stored = localStorage.getItem('uva_erp_data');
                    if (stored) {
                        const data = JSON.parse(stored);
                        
                        // Migration guard for old attendance structures offline
                        if (data.attState && Object.keys(data.attState).length > 0 && !Object.keys(data.attState)[0].includes('-')) {
                             const migratedAtt = {};
                             migratedAtt[new Date().toISOString().split('T')[0]] = data.attState;
                             data.attState = migratedAtt;
                        }

                        Object.assign(state, data);
                    }
                    render();
                }
            } catch (e) {
                console.error("Failed to load offline data", e);
                render();
            }
        };

        // --- AUTH ACTIONS ---
        window.handleLogin = (e) => {
            e.preventDefault();
            if(!auth) return alert("System running in offline mode. Please use Bypass Login.");
            
            const fd = new FormData(e.target);
            const email = fd.get('email');
            const password = fd.get('password');
            state.loginError = '';
            state.isAuthLoading = true; 
            render(); 

            auth.signInWithEmailAndPassword(email, password).catch(error => {
                state.isAuthLoading = false;
                state.loginError = error.message;
                render();
            });
        };

        window.bypassLogin = () => {
            state.user = { email: 'admin@uva.com (Bypassed)', uid: 'bypassed_user' };
            window.loadDataFromCloud('bypassed_user');
        };

        window.handleLogout = () => {
            if(state.user && state.user.uid === 'bypassed_user') {
                state.user = null;
                render();
            } else if (auth) {
                auth.signOut();
            }
        };

        // --- GLOBAL ACTIONS ---
        window.switchTab = (tab) => {
            state.activeTab = tab;
            state.receiptData = null;
            state.attendanceReportData = null;
            state.individualReportData = null;
            render();
        };

        window.openWhatsApp = (phone, type, name, courseName) => {
            let message = "";
            if (type === 'welcome_inquiry') {
                message = `Hello ${name},\n\nWelcome to *Udaan Vibrant Academy (UVA)*! 🚀\nThank you for your inquiry regarding our ${courseName} course. Where learning takes flight!\n\nLet us know when you'd like to schedule a visit.`;
            } else if (type === 'followup_inquiry') {
                message = `Hello ${name},\n\nWe noticed your interest in the *${courseName}* at Udaan Vibrant Academy! 🌟\n\nSeats are filling up fast for our upcoming batch. Do you have any questions?\n\nLet's build your future together! 🚀`;
            } else if (type === 'absent_alert') {
                message = `Dear Parent/Student,\n\nNotice from UVA: ${name} was marked ABSENT today for the ${courseName} batch. Regular attendance is crucial for success!\n\nRegards,\nUdaan Vibrant Academy`;
            } else if (type === 'admission_form') {
                message = `Dear ${name} / Parent,\n\nWelcome to *Udaan Vibrant Academy (UVA)*! 🎉\n\nYour admission for the ${courseName} program is successfully confirmed.\n\nPlease find your detailed Admission Form PDF attached to this message (downloaded to your device).\n\nLet's build your future together! 🚀`;
            }
            state.waModalConfig = { phone, message };
            render();
        };

        window.closeWhatsApp = () => { state.waModalConfig = null; render(); };
        window.updateWAMessage = (val) => { state.waModalConfig.message = val; };
        window.updateWAPhone = (val) => { state.waModalConfig.phone = val; };
        
        window.sendWhatsApp = (e) => {
            e.preventDefault();
            if (!state.waModalConfig) return;
            const encodedMessage = encodeURIComponent(state.waModalConfig.message);
            const whatsappUrl = `https://wa.me/91${state.waModalConfig.phone}?text=${encodedMessage}`;
            window.open(whatsappUrl, '_blank');
            window.closeWhatsApp();
        };

        window.shareFormWhatsApp = () => {
            // First trigger the PDF download
            window.generatePremiumPDF();
            // Then wait just a second for it to initiate and open WhatsApp modal so user can attach it
            setTimeout(() => {
                const courseName = state.receiptData.type === 'Skill' ? state.receiptData.course : state.receiptData.std;
                window.openWhatsApp(state.receiptData.phone, 'admission_form', state.receiptData.name, courseName);
            }, 1000);
        };

        // --- INQUIRY ACTIONS ---
        window.toggleInquiryForm = () => {
            state.showNewInquiryForm = !state.showNewInquiryForm;
            if (!state.showNewInquiryForm) {
                state.editingInquiryId = null;
                state.newInquiryData = { name: '', phone: '', type: 'Skill', course: '', std: '', board: '', medium: '', source: 'Flyer', inquiryDate: new Date().toISOString().split('T')[0] };
            }
            render();
        };

        window.updateNewInquiryData = (key, val) => {
            state.newInquiryData[key] = val;
            if(key === 'type') render(); 
        };

        window.saveInquiry = (e) => {
            e.preventDefault();
            if (state.editingInquiryId) {
                const index = state.inquiries.findIndex(i => i.id === state.editingInquiryId);
                if (index !== -1) {
                    state.inquiries[index] = { ...state.inquiries[index], ...state.newInquiryData, date: state.newInquiryData.inquiryDate };
                }
                state.editingInquiryId = null;
            } else {
                state.inquiries.push({
                    ...state.newInquiryData,
                    id: `INQ-${Math.floor(Math.random() * 1000)}`,
                    status: 'New',
                    date: state.newInquiryData.inquiryDate || new Date().toISOString().split('T')[0]
                });
            }
            state.showNewInquiryForm = false;
            state.newInquiryData = { name: '', phone: '', type: 'Skill', course: '', std: '', board: '', medium: '', source: 'Flyer', inquiryDate: new Date().toISOString().split('T')[0] };
            window.saveDataToCloud();
            render();
        };

        window.editInquiry = (id) => {
            const inq = state.inquiries.find(i => i.id === id);
            if (inq) {
                state.newInquiryData = { ...inq, inquiryDate: inq.date };
                state.editingInquiryId = id;
                state.showNewInquiryForm = true;
                render();
            }
        };

        window.deleteInquiry = (id) => {
            if (confirm("Are you sure you want to delete this inquiry?")) {
                state.inquiries = state.inquiries.filter(i => i.id !== id);
                window.saveDataToCloud();
                render();
            }
        };

        window.updateInquiryStatus = (id, val) => {
            const inq = state.inquiries.find(i => i.id === id);
            if(inq) inq.status = val;
            window.saveDataToCloud();
            render();
        };

        window.openEnrollModal = (id) => {
            state.enrollingLead = state.inquiries.find(i => i.id === id);
            render();
        };

        window.closeEnrollModal = () => {
            state.enrollingLead = null;
            render();
        };

        window.confirmEnroll = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const newStudent = {
                id: `UVA-${Math.floor(1000 + Math.random() * 9000)}`,
                name: state.enrollingLead.name,
                phone: state.enrollingLead.phone,
                type: state.enrollingLead.type,
                course: state.enrollingLead.course,
                std: state.enrollingLead.std,
                board: state.enrollingLead.board,
                medium: state.enrollingLead.medium,
                date: fd.get('joiningDate') || new Date().toISOString().split('T')[0],
                dob: fd.get('dob') || 'Not Provided',
                gender: fd.get('gender') || 'Not Specified',
                bloodGroup: fd.get('bloodGroup') || '-',
                address: fd.get('address') || '',
                city: fd.get('city') || '',
                state: fd.get('state') || 'Gujarat',
                pincode: fd.get('pincode') || '',
                batchTiming: fd.get('batchTiming') || 'To be assigned',
                parentName: fd.get('parentName') || 'Not Provided',
                parentPhone: fd.get('parentPhone') || '-',
                parentOccupation: fd.get('parentOccupation') || '-',
                parentEmail: fd.get('parentEmail') || '-',
                freeOffer: fd.get('freeOffer') || 'None',
                photoUrl: null,
                studentSignUrl: null,
                parentSignUrl: null,
                docAadhaar: null,
                docMarksheet: null,
                docLeavingCert: null
            };
            
            state.students.push(newStudent);
            const inq = state.inquiries.find(i => i.id === state.enrollingLead.id);
            if(inq) inq.status = 'Enrolled';
            
            const name = state.enrollingLead.name;
            state.enrollingLead = null;
            window.saveDataToCloud();
            render();
            alert(`${name} successfully enrolled! Check Admissions tab to view or print form.`);
        };

        // --- ADMISSION ACTIONS ---
        window.openReceipt = (id) => {
            state.receiptData = state.students.find(s => s.id === id);
            render();
        };
        window.closeReceipt = () => { state.receiptData = null; render(); };

        window.openEditStudentModal = (id) => {
            state.editingStudentData = { ...state.students.find(s => s.id === id) };
            render();
        };

                        if(type === 'appIconUrl') setupPWA();

        window.generatePremiumPDF = () => {
            const btn = document.getElementById('pdf-download-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 mr-2 animate-spin"></i> Generating PDF...`;
            if(window.lucide) lucide.createIcons();

            const element = document.getElementById('premium-admission-document');
            
            // TEMPORARILY DISABLE SCALE FOR FLAWLESS PDF GENERATION ON MOBILE
            document.documentElement.style.setProperty('--doc-scale', '1');

            // Scroll to top to prevent html2canvas clipping bugs
            window.scrollTo(0, 0);

            let pdfName = `UVA_Document.pdf`;
            if (state.receiptData) pdfName = `UVA_Admission_${state.receiptData.id}.pdf`;
            else if (state.attendanceReportData) pdfName = `UVA_Batch_Report_${state.attendanceReportData.month}.pdf`;
            else if (state.individualReportData) pdfName = `UVA_Student_Report_${state.individualReportData.student.id}.pdf`;

            const opt = {
                margin:       0,
                filename:     pdfName,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true, 
                    scrollY: 0, 
                    scrollX: 0, 
                    windowWidth: 800 // CRITICAL: Forces full A4 width capture on mobile
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            setTimeout(() => {
                html2pdf().set(opt).from(element).save().then(() => {
                    btn.innerHTML = originalText;
                    if(window.lucide) lucide.createIcons();
                    window.updateScale(); // RESTORE SCALE AFTER DOWNLOAD

        function setupPWA() {
            const appleIcon = document.getElementById('apple-icon');
            if (appleIcon) {
                appleIcon.href = state.appIconUrl;
            }

            const manifest = {
                name: "UVA ERP",
                short_name: "UVA ERP",
                description: "Udaan Vibrant Academy ERP",
                start_url: location.href,
                display: "standalone",
                background_color: "#f8fafc",
                theme_color: "#0f172a",
                icons: [
                    { src: state.appIconUrl, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
                    { src: state.appIconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
                ]
            };
            
            const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
            document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', (e) => {
                    e.respondWith(fetch(e.request).catch(() => new Response('Offline Mode Active. Please connect to internet.')));
                });
            `;
            const swBlob = new Blob([swCode], {type: 'text/javascript'});
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW Registration failed: ', err));
            }
        }

            <aside class="hidden md:flex w-64 bg-slate-900 text-white flex-col print:hidden shadow-xl z-20 flex-shrink-0">
                <div class="p-6 border-b border-slate-700">
                    <h1 class="text-3xl font-extrabold text-orange-500 tracking-tight">UVA<span class="text-white"> ERP</span></h1>
                    <p class="text-xs text-slate-400 mt-1 font-medium tracking-wide uppercase">Udaan Vibrant Academy</p>
                </div>
                <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                    <div onclick="switchTab('dashboard')" class="${btnClass(state.activeTab === 'dashboard')}">
                        <i data-lucide="bar-chart-3" class="w-5 h-5"></i> <span>Dashboard</span>
                    </div>
                    <div onclick="switchTab('inquiries')" class="${btnClass(state.activeTab === 'inquiries')}">
                        <i data-lucide="user-plus" class="w-5 h-5"></i> <span>Inquiries CRM</span>
                    </div>
                    <div onclick="switchTab('admissions')" class="${btnClass(state.activeTab === 'admissions')}">
                        <i data-lucide="book-open" class="w-5 h-5"></i> <span>Admissions</span>
                    </div>
                    <div onclick="switchTab('attendance')" class="${btnClass(state.activeTab === 'attendance')}">
                        <i data-lucide="check-square" class="w-5 h-5"></i> <span>Attendance</span>
                    </div>
                </nav>
                <div class="p-4 border-t border-slate-700 flex flex-col flex-shrink-0">
                    ${installBtn}
                    ${appIconUploadBtn}
                    <button onclick="handleLogout()" class="w-full text-slate-400 flex items-center justify-center space-x-2 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-red-400 transition-colors text-sm">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        <span class="font-bold tracking-wide uppercase">Secure Logout</span>
                    </button>
                </div>
            </aside>`;
        }

        function MainContentTemplate() {
            if (state.receiptData) return ReceiptViewTemplate();
            if (state.attendanceReportData) return AttendanceReportViewTemplate();
            if (state.individualReportData) return IndividualReportTemplate();
            
            switch (state.activeTab) {
                case 'dashboard': return DashboardTemplate();
                case 'inquiries': return InquiriesTemplate();
                case 'admissions': return AdmissionsTemplate();
                case 'attendance': return AttendanceTemplate();
                default: return DashboardTemplate();
            }
        }

        function DashboardTemplate() {
            const activeInquiries = state.inquiries.filter(i => i.status !== 'Enrolled' && i.status !== 'Closed').length;
            const enrolledCount = state.students.length;
            const sourceCounts = state.inquiries.reduce((acc, inq) => { acc[inq.source] = (acc[inq.source] || 0) + 1; return acc; }, {});
            const totalInquiries = state.inquiries.length;
            const conversionRate = totalInquiries > 0 ? Math.round((enrolledCount / totalInquiries) * 100) : 0;

            let sourceHTML = Object.entries(sourceCounts).sort((a,b)=>b[1]-a[1]).map(([source, count]) => `
                <div>
                    <div class="flex justify-between text-sm font-bold mb-2">
                        <span class="text-slate-700">${source}</span>
                        <span class="text-slate-600">${count} Leads <span class="font-normal text-slate-400 ml-1">(${Math.round(count/totalInquiries*100)}%)</span></span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden shadow-inner">
                        <div class="bg-gradient-to-r from-orange-400 to-orange-500 h-3 rounded-full transition-all duration-1000 ease-out" style="width: ${(count/totalInquiries)*100}%"></div>
                    </div>
                </div>
            `).join('');
            if(!sourceHTML) sourceHTML = `<p class="text-slate-400 text-sm">No data available yet.</p>`;

            let recentHTML = state.students.slice(-5).reverse().map(std => `
                <div class="flex items-center space-x-4 p-2 hover:bg-slate-50 rounded-xl transition-colors">
                    <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center font-bold text-lg shadow-sm border border-orange-200 flex-shrink-0">
                        ${std.name.charAt(0)}
                    </div>
                    <div class="truncate">
                        <p class="font-bold text-slate-800 text-sm truncate">${std.name}</p>
                        <p class="text-xs text-slate-500 font-medium mt-0.5 truncate">${std.type === 'Skill' ? std.course : `${std.std} (${std.medium})`}</p>
                    </div>
                </div>
            `).join('');
            if(!recentHTML) recentHTML = `<p class="text-slate-400 text-sm">No enrollments yet.</p>`;

            return `
            <div class="p-4 sm:p-6 md:p-8 min-h-full animate-fade-in">
                <div class="mb-6 md:mb-8">
                    <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">Academy Dashboard</h2>
                    <p class="text-sm md:text-base text-slate-500 font-medium mt-1">Track your growth, conversions, and top channels.</p>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-6 mb-6 md:mb-8">
                    <div onclick="switchTab('inquiries')" class="cursor-pointer bg-white rounded-2xl shadow-sm p-4 md:p-6 border border-slate-200 flex items-center space-x-4 md:space-x-5 transform hover:-translate-y-1 transition-all duration-300 hover:shadow-md hover:border-blue-300">
                        <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-3 md:p-4 rounded-xl shadow-inner flex-shrink-0"><i data-lucide="users" class="w-6 h-6 md:w-7 md:h-7"></i></div>
                        <div class="truncate"><p class="text-[10px] md:text-xs text-slate-500 font-semibold mb-0.5 md:mb-1 uppercase tracking-wide truncate">Active Inquiries</p><p class="text-2xl md:text-3xl font-extrabold text-slate-800">${activeInquiries}</p></div>
                    </div>
                    <div onclick="switchTab('admissions')" class="cursor-pointer bg-white rounded-2xl shadow-sm p-4 md:p-6 border border-slate-200 flex items-center space-x-4 md:space-x-5 transform hover:-translate-y-1 transition-all duration-300 hover:shadow-md hover:border-green-300">
                        <div class="bg-gradient-to-br from-green-500 to-green-600 text-white p-3 md:p-4 rounded-xl shadow-inner flex-shrink-0"><i data-lucide="book-open" class="w-6 h-6 md:w-7 md:h-7"></i></div>
                        <div class="truncate"><p class="text-[10px] md:text-xs text-slate-500 font-semibold mb-0.5 md:mb-1 uppercase tracking-wide truncate">Total Enrolled</p><p class="text-2xl md:text-3xl font-extrabold text-slate-800">${enrolledCount}</p></div>
                    </div>
                    <div onclick="switchTab('admissions')" class="cursor-pointer bg-white rounded-2xl shadow-sm p-4 md:p-6 border border-slate-200 flex items-center space-x-4 md:space-x-5 transform hover:-translate-y-1 transition-all duration-300 hover:shadow-md hover:border-purple-300">
                        <div class="bg-gradient-to-br from-purple-500 to-purple-600 text-white p-3 md:p-4 rounded-xl shadow-inner flex-shrink-0"><i data-lucide="bar-chart-3" class="w-6 h-6 md:w-7 md:h-7"></i></div>
                        <div class="truncate"><p class="text-[10px] md:text-xs text-slate-500 font-semibold mb-0.5 md:mb-1 uppercase tracking-wide truncate">Conversion Rate</p><p class="text-2xl md:text-3xl font-extrabold text-slate-800">${conversionRate}%</p></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
                    <div onclick="switchTab('inquiries')" class="cursor-pointer bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-2 hover:shadow-md hover:border-orange-300 transition-all">
                        <h3 class="text-base md:text-lg font-bold text-slate-800 mb-6 flex items-center">
                            <i data-lucide="search" class="mr-2 text-orange-500 w-5 h-5"></i> Lead Sources Performance
                        </h3>
                        <div class="space-y-5 md:space-y-6">${sourceHTML}</div>
                    </div>
                    <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h3 class="text-base md:text-lg font-bold text-slate-800 mb-4 border-b pb-3">Recent Admissions</h3>
                        <div class="space-y-3 pt-2">${recentHTML}</div>
                    </div>
                </div>
            </div>`;
        }

        function InquiriesTemplate() {
            let formHTML = '';
            if(state.showNewInquiryForm) {
                const d = state.newInquiryData;
                let dynamicFields = '';
                if(d.type === 'Skill') {
                    const options = Object.keys(SKILL_COURSES).map(c => `<option value="${c}" ${d.course===c?'selected':''}>${c}</option>`).join('');
                    dynamicFields = `
                    <div class="col-span-1 md:col-span-3">
                        <label class="block text-sm font-bold text-slate-600 mb-1.5">Select Professional Course</label>
                        <select required onchange="window.updateNewInquiryData('course', this.value)" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 bg-white text-sm">
                            <option value="">-- Select Course --</option>${options}
                        </select>
                    </div>`;
                } else {
                    const stdOpts = TUITION_CLASSES.map(c => `<option value="${c}" ${d.std===c?'selected':''}>${c}</option>`).join('');
                    dynamicFields = `
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-5 col-span-1 md:col-span-3">
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-1.5">Standard</label>
                            <select required onchange="window.updateNewInquiryData('std', this.value)" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 bg-white text-sm">
                                <option value="">Select Class</option>${stdOpts}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-1.5">Board</label>
                            <select required onchange="window.updateNewInquiryData('board', this.value)" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 bg-white text-sm">
                                <option value="">Select Board</option>
                                <option value="GSEB" ${d.board==='GSEB'?'selected':''}>GSEB</option>
                                <option value="CBSE" ${d.board==='CBSE'?'selected':''}>CBSE</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-1.5">Medium</label>
                            <select required onchange="window.updateNewInquiryData('medium', this.value)" class="w-full p-2.5 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 bg-white text-sm">
                                <option value="">Select Medium</option>
                                <option value="Gujarati" ${d.medium==='Gujarati'?'selected':''}>Gujarati</option>
                                <option value="English" ${d.medium==='English'?'selected':''}>English</option>
                            </select>
                        </div>
                    </div>`;
                }

                const formTitle = state.editingInquiryId ? 'Update Lead Details' : 'Capture Lead Details';
                const submitBtn = state.editingInquiryId ? 'Update Lead' : 'Save Lead';

                formHTML = `
                <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 md:mb-8 animate-fade-in">
                    <h3 class="text-base md:text-lg font-bold text-slate-800 mb-4 border-b pb-3">${formTitle}</h3>
                    <form onsubmit="window.saveInquiry(event)" class="space-y-4 md:space-y-5">
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-5">
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-1.5">Student Name</label>
                                <input required type="text" value="${d.name}" oninput="window.updateNewInquiryData('name', this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none transition-all text-sm" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-1.5">WhatsApp Number</label>
                                <input required type="text" value="${d.phone}" oninput="window.updateNewInquiryData('phone', this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none transition-all text-sm" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-1.5">Inquiry Date</label>
                                <input required type="date" value="${d.inquiryDate}" onchange="window.updateNewInquiryData('inquiryDate', this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none transition-all text-sm" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-1.5">Lead Source</label>
                                <select onchange="window.updateNewInquiryData('source', this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none transition-all text-sm">
                                    ${LEAD_SOURCES.map(s => `<option value="${s}" ${d.source===s?'selected':''}>${s}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <div class="p-4 md:p-5 bg-slate-50 border border-slate-200 rounded-xl">
                            <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-6 mb-5">
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="radio" name="progType" onchange="window.updateNewInquiryData('type', 'Skill')" ${d.type==='Skill'?'checked':''} class="w-4 h-4 text-orange-500 focus:ring-orange-500 border-slate-300" />
                                    <span class="font-bold text-slate-700 text-sm">Skills & AI Academy</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="radio" name="progType" onchange="window.updateNewInquiryData('type', 'Tuition')" ${d.type==='Tuition'?'checked':''} class="w-4 h-4 text-orange-500 focus:ring-orange-500 border-slate-300" />
                                    <span class="font-bold text-slate-700 text-sm">Academic Tuition (9-12)</span>
                                </label>
                            </div>
                            ${dynamicFields}
                        </div>

                        <div class="flex flex-col sm:flex-row justify-end space-y-3 sm:space-y-0 sm:space-x-4 pt-2">
                            <button type="button" onclick="window.toggleInquiryForm()" class="w-full sm:w-auto px-5 py-3 sm:py-2.5 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors text-sm">Cancel</button>
                            <button type="submit" class="w-full sm:w-auto px-6 py-3 sm:py-2.5 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-colors shadow-md text-sm">${submitBtn}</button>
                        </div>
                    </form>
                </div>`;
            }

            let tableHTML = state.inquiries.map(inq => {
                const badgeClass = inq.type === 'Skill' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700';
                const statusClass = inq.status === 'Enrolled' ? 'bg-green-50 text-green-700 border-green-200' :
                                    inq.status === 'New' ? 'bg-blue-50 text-blue-700 border-blue-200' :
                                    inq.status === 'Closed' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-orange-50 text-orange-700 border-orange-200';
                
                const interestStr = inq.type === 'Skill' ? inq.course : `${inq.std} | ${inq.board} | ${inq.medium}`;
                
                let actionsHTML = `
                    <button title="Send WhatsApp Welcome" onclick="window.openWhatsApp('${inq.phone}', 'welcome_inquiry', '${inq.name}', '${interestStr}')" class="p-2 text-green-600 hover:bg-green-100 rounded-lg transition-colors">
                        <i data-lucide="message-circle" class="w-5 h-5 md:w-4 md:h-4"></i>
                    </button>
                `;
                
                if (inq.status !== 'Enrolled' && inq.status !== 'Closed') {
                    actionsHTML += `
                        <button title="Send WhatsApp Follow-up" onclick="window.openWhatsApp('${inq.phone}', 'followup_inquiry', '${inq.name}', '${interestStr}')" class="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors">
                            <i data-lucide="message-circle" class="w-5 h-5 md:w-4 md:h-4"></i>
                        </button>
                        <button onclick="window.openEnrollModal('${inq.id}')" class="ml-2 px-3 py-1.5 md:px-4 md:py-1.5 bg-slate-900 text-white text-xs md:text-sm font-bold rounded-lg hover:bg-slate-800 shadow-sm transition-colors whitespace-nowrap">
                            Enroll Now
                        </button>
                    `;
                } else if (inq.status === 'Enrolled') {
                    actionsHTML += `
                        <span class="ml-2 flex items-center text-green-600 font-bold text-xs md:text-sm bg-green-50 px-2 md:px-3 py-1.5 rounded-lg border border-green-200 inline-flex whitespace-nowrap">
                            <i data-lucide="check-circle" class="w-4 h-4 mr-1"></i> Enrolled
                        </span>
                    `;
                }

                actionsHTML += `
                    <button onclick="window.editInquiry('${inq.id}')" title="Edit Inquiry" class="ml-2 p-2 text-slate-500 hover:bg-slate-100 hover:text-blue-600 rounded-lg transition-colors">
                        <i data-lucide="pencil" class="w-5 h-5 md:w-4 md:h-4"></i>
                    </button>
                    <button onclick="window.deleteInquiry('${inq.id}')" title="Delete Inquiry" class="p-2 text-slate-500 hover:bg-slate-100 hover:text-red-600 rounded-lg transition-colors">
                        <i data-lucide="trash-2" class="w-5 h-5 md:w-4 md:h-4"></i>
                    </button>
                `;

                return `
                <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0">
                    <td class="p-3 sm:p-4 align-top whitespace-nowrap">
                        <p class="font-bold text-slate-800 text-sm">${inq.name}</p>
                        <p class="text-xs text-slate-500 font-medium mt-0.5">${inq.phone}</p>
                        <p class="text-[10px] text-slate-400 mt-1 font-medium bg-slate-100 inline-block px-2 py-0.5 rounded border border-slate-200">Inq: ${new Date(inq.date).toLocaleDateString('en-IN')}</p>
                    </td>
                    <td class="p-3 sm:p-4 align-top whitespace-nowrap max-w-[150px] sm:max-w-[200px] md:max-w-none truncate">
                        <span class="inline-block px-2 py-0.5 rounded text-[10px] uppercase tracking-widest font-bold mb-1 ${badgeClass}">${inq.type}</span>
                        <p class="text-xs sm:text-sm font-bold text-slate-700 truncate" title="${interestStr}">${interestStr}</p>
                    </td>
                    <td class="p-3 sm:p-4 text-xs sm:text-sm font-medium text-slate-600 align-top whitespace-nowrap">${inq.source}</td>
                    <td class="p-3 sm:p-4 align-top whitespace-nowrap">
                        <select onchange="window.updateInquiryStatus('${inq.id}', this.value)" class="text-xs md:text-sm border rounded-lg p-1.5 md:p-2 font-bold outline-none cursor-pointer w-full md:w-auto ${statusClass}">
                            <option value="New" ${inq.status==='New'?'selected':''}>New</option>
                            <option value="Demo" ${inq.status==='Demo'?'selected':''}>Demo Attended</option>
                            <option value="Follow-Up" ${inq.status==='Follow-Up'?'selected':''}>Follow-Up</option>
                            <option value="Enrolled" ${inq.status==='Enrolled'?'selected':''} disabled>Enrolled</option>
                            <option value="Closed" ${inq.status==='Closed'?'selected':''}>Closed</option>
                        </select>
                    </td>
                    <td class="p-3 sm:p-4 text-right flex justify-end items-center space-x-0.5 md:space-x-1 align-top whitespace-nowrap">${actionsHTML}</td>
                </tr>`;
            }).join('');
            if(!tableHTML) tableHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-500 font-medium text-sm">No inquiries found.</td></tr>`;

            return `
            <div class="p-4 sm:p-6 md:p-8 relative min-h-full animate-fade-in">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 md:mb-8 gap-4">
                    <div>
                        <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">Inquiries & CRM</h2>
                        <p class="text-sm md:text-base text-slate-500 font-medium mt-1">Manage leads, track status, and enroll students.</p>
                    </div>
                    <button onclick="window.toggleInquiryForm()" class="w-full sm:w-auto bg-orange-500 text-white px-5 py-3 sm:py-2.5 rounded-xl flex items-center justify-center space-x-2 hover:bg-orange-600 font-bold shadow-md transition-colors">
                        <i data-lucide="plus" class="w-5 h-5"></i> <span>New Inquiry</span>
                    </button>
                </div>
                ${formHTML}
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto w-full">
                    <table class="w-full min-w-[700px] text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-[10px] sm:text-xs uppercase tracking-wider text-slate-500 font-bold">
                                <th class="p-3 sm:p-4">Name & Contact</th><th class="p-3 sm:p-4">Interest (Course/Class)</th><th class="p-3 sm:p-4">Source</th><th class="p-3 sm:p-4">Status</th><th class="p-3 sm:p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody>${tableHTML}</tbody>
                    </table>
                </div>
                ${EnrollModalTemplate()}
            </div>`;
        }

        function EnrollModalTemplate() {
            if (!state.enrollingLead) return '';
            const l = state.enrollingLead;
            const programName = l.type === 'Skill' ? l.course : `${l.std} ${l.board}`;
            
            return `
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-3 sm:p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[85vh] md:max-h-[90vh] overflow-y-auto border border-slate-200">
                    <div class="p-4 md:p-6 border-b border-slate-200 flex justify-between items-center bg-slate-50 sticky top-0 z-10">
                        <div>
                            <h3 class="text-lg md:text-xl font-extrabold text-slate-800">Complete Admission Details</h3>
                            <p class="text-xs md:text-sm text-slate-500 mt-1 font-medium">Enrolling <span class="font-bold text-orange-600">${l.name}</span> into <br class="md:hidden"/>${programName}</p>
                        </div>
                        <button type="button" onclick="window.closeEnrollModal()" class="p-2 text-slate-400 hover:bg-slate-200 hover:text-slate-700 rounded-full transition-colors">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <form onsubmit="window.confirmEnroll(event)" class="p-4 md:p-8 space-y-6 md:space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                            <!-- Student Details -->
                            <div class="space-y-4 md:space-y-5">
                                <h4 class="font-bold text-slate-800 border-b-2 border-slate-100 pb-2 flex items-center text-sm md:text-base"><i data-lucide="user-plus" class="w-4 h-4 mr-2 text-orange-500"></i> Student Information</h4>

        // --- ATTENDANCE TEMPLATE ---
        function AttendanceTemplate() {
            const batches = getBatches();
            const filteredStudents = getFilteredStudents();

            let batchOptions = batches.map(b => `<option value="${b}" ${state.attSelectedBatch===b?'selected':''}>${b}</option>`).join('');
            
            let displayHTML = '';
            if (state.attSelectedBatch) {
                const dateData = state.attState[state.attDate] || {};
                let presentCount = 0;
                let absentCount = 0;

                let stdRows = filteredStudents.map(std => {
                    const currentStatus = dateData[std.id]?.status || null; // Unmarked default
                    const currentReason = dateData[std.id]?.reason || '';
                    
                    if (currentStatus === 'Present') presentCount++;

        // --- ATTENDANCE REPORT TEMPLATE (Printable) ---
        function AttendanceReportViewTemplate() {
            const data = state.attendanceReportData;
            const formattedMonth = new Date(data.month + '-01').toLocaleString('en-IN', { month: 'long', year: 'numeric' });
            
            const [year, month] = data.month.split('-');
            const prefix = `${year}-${month}-`;
            const validDates = Object.keys(data.state).filter(k => k.startsWith(prefix));

            let stdHTML = data.students.map((std, index) => {
                let p = 0, a = 0;
                validDates.forEach(date => {
                    const st = data.state[date]?.[std.id]?.status;
                    if(st === 'Present') p++;
                    if(st === 'Absent') a++;
                });
                const totalWorkingDays = p + a;
                const percentage = totalWorkingDays > 0 ? Math.round((p / totalWorkingDays) * 100) : 0;
                
                return `
                <tr class="border-b border-slate-200 text-xs md:text-sm">
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-bold text-slate-500">${index + 1}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 font-mono font-bold text-slate-600">${std.id}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 font-extrabold text-slate-900">${std.name}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-bold text-slate-700">${totalWorkingDays}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-extrabold text-green-600">${p}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-bold text-red-500">${a}</td>
                    <td class="p-2 md:p-3.5 text-center">
                        <span class="px-2 md:px-3 py-1 rounded-full text-[10px] md:text-xs font-extrabold tracking-wide ${percentage >= 75 ? 'bg-green-100 text-green-800' : percentage > 0 ? 'bg-red-100 text-red-800' : 'bg-slate-100 text-slate-400'}">${percentage}%</span>

        // --- INDIVIDUAL STUDENT ATTENDANCE REPORT TEMPLATE (Printable) ---
        function IndividualReportTemplate() {
            const data = state.individualReportData;
            const [year, month] = data.month.split('-');
            const formattedMonth = new Date(data.month + '-01').toLocaleString('en-IN', { month: 'long', year: 'numeric' });
            const daysInMonth = new Date(year, month, 0).getDate();
            
            let presentCount = 0;
            let absentCount = 0;
            let rowsHTML = '';
            
            for(let i=1; i<=daysInMonth; i++) {
                const dateStr = `${year}-${month}-${i.toString().padStart(2, '0')}`;
                const dayName = new Date(year, month-1, i).toLocaleDateString('en-IN', {weekday: 'short'});
                const isSunday = new Date(year, month-1, i).getDay() === 0;
                
                const statusObj = data.attState[dateStr]?.[data.student.id];
                const status = statusObj?.status;
                const reason = statusObj?.reason || '-';
                
                let statusBadge = '<span class="text-slate-400 font-medium">- Unmarked -</span>';
                if (status === 'Present') {
                    presentCount++;
                    statusBadge = '<span class="px-3 py-1 bg-green-100 text-green-700 font-bold rounded text-[10px] uppercase tracking-wide">Present</span>';
                } else if (status === 'Absent') {
                    absentCount++;
                    statusBadge = '<span class="px-3 py-1 bg-red-100 text-red-700 font-bold rounded text-[10px] uppercase tracking-wide">Absent</span>';
                } else if (isSunday) {
                    statusBadge = '<span class="text-slate-400 font-medium italic">Sunday</span>';
                }

                rowsHTML += `
                <tr class="border-b border-slate-200 text-xs md:text-sm ${isSunday ? 'bg-slate-100' : 'bg-white'}">
                    <td class="p-2 md:p-3 border-r border-slate-300 text-center font-bold text-slate-600">${i}</td>
                    <td class="p-2 md:p-3 border-r border-slate-300 font-bold text-slate-800">${dateStr}</td>
                    <td class="p-2 md:p-3 border-r border-slate-300 font-medium text-slate-500">${dayName}</td>
                    <td class="p-2 md:p-3 border-r border-slate-300 text-center">${statusBadge}</td>
                    <td class="p-2 md:p-3 text-slate-600 italic text-[10px] md:text-xs">${reason !== '-' && reason !== '' ? reason : ''}</td>
                </tr>`;
            }
            
            const totalMarked = presentCount + absentCount;
            const percentage = totalMarked > 0 ? Math.round((presentCount / totalMarked) * 100) : 0;

            return `
            <div class="p-4 sm:p-8 max-w-4xl mx-auto bg-gray-50 min-h-[100dvh] print:p-0 print:bg-white animate-fade-in">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-6 print:hidden gap-3">
                    <button onclick="window.closeIndividualReport()" class="w-full sm:w-auto px-5 py-2.5 bg-white border border-slate-300 rounded-xl hover:bg-slate-50 font-bold shadow-sm text-slate-700 transition-colors">← Back</button>
                    <button onclick="window.print()" class="w-full sm:w-auto px-6 py-2.5 bg-[#1F5FBF] text-white rounded-xl hover:bg-blue-800 font-bold flex items-center justify-center space-x-2 shadow-sm transition-colors">
                        <i data-lucide="printer" class="w-4 h-4"></i> <span>Print Individual Sheet</span>
                    </button>
                </div>
                
                <div class="overflow-x-auto print:overflow-visible w-full flex justify-center">
                    <div class="bg-white p-6 md:p-10 rounded-2xl shadow-xl print:shadow-none print:p-0 border-t-[8px] md:border-t-[12px] border-[#1F5FBF] border-x border-b w-[794px] min-w-[794px] max-w-[794px] mobile-scale-target flex-shrink-0">
                        <div class="flex justify-between items-center border-b-[3px] border-[#1F5FBF] pb-6 mb-6">
                            <div class="w-20 h-20 md:w-28 md:h-28 flex items-center justify-center overflow-hidden bg-white">
                                <img src="${state.formLogoUrl}" alt="UVA Logo" class="w-full h-full object-contain" />
                            </div>
                            <div class="flex-1 text-center px-4">
                                <h1 class="text-2xl md:text-3xl font-extrabold text-[#0A1E4D] tracking-tight">UDAAN VIBRANT ACADEMY</h1>
                                <p class="text-xs md:text-sm text-slate-600 italic mt-1 font-bold">"Where Learning Takes Flight"</p>
                                <div class="mt-2 md:mt-3 inline-block bg-[#1F5FBF] text-white px-4 md:px-5 py-1.5 rounded-full font-bold uppercase tracking-widest text-[10px] md:text-xs shadow-sm">Individual Student Attendance Sheet</div>
                            </div>
                            <div class="w-20 h-20 md:w-28 md:h-28"></div>
                        </div>
                        
                        <div class="flex justify-between items-center bg-blue-50 border-2 border-blue-200 p-4 md:p-5 rounded-xl mb-8">
                            <div>
                                <p class="text-[10px] md:text-[11px] text-blue-600 font-bold uppercase tracking-widest">Student Information</p>
                                <p class="text-xl md:text-2xl font-black text-[#0A1E4D] mt-1">${data.student.name}</p>
                                <p class="text-xs md:text-sm font-bold text-slate-600 mt-1.5">ID: <span class="font-mono text-[#1F5FBF]">${data.student.id}</span> | Batch: ${data.student.type === 'Skill' ? data.student.course : `${data.student.std} ${data.student.board}`}</p>
                            </div>
                            <div class="text-right flex flex-col items-end">
                                <p class="text-[10px] md:text-[11px] text-blue-600 font-bold uppercase tracking-widest mb-1">Month Selected</p>
                                <span class="bg-[#0A1E4D] text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow-sm">${formattedMonth}</span>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-4 gap-4 mb-6">
                            <div class="bg-slate-50 border border-slate-200 p-3 rounded-xl text-center">
                                <p class="text-[10px] font-bold text-slate-500 uppercase">Marked Days</p>
                                <p class="text-xl font-black text-slate-800">${totalMarked}</p>
                            </div>
                            <div class="bg-green-50 border border-green-200 p-3 rounded-xl text-center">
                                <p class="text-[10px] font-bold text-green-600 uppercase">Present</p>
                                <p class="text-xl font-black text-green-700">${presentCount}</p>
                            </div>
                            <div class="bg-red-50 border border-red-200 p-3 rounded-xl text-center">
                                <p class="text-[10px] font-bold text-red-600 uppercase">Absent</p>
                                <p class="text-xl font-black text-red-700">${absentCount}</p>
                            </div>
                            <div class="bg-blue-50 border border-blue-200 p-3 rounded-xl text-center">
                                <p class="text-[10px] font-bold text-blue-600 uppercase">Attendance %</p>
                                <p class="text-xl font-black ${percentage >= 75 ? 'text-green-600' : 'text-red-600'}">${percentage}%</p>
                            </div>
                        </div>
                        
                        <table class="w-full text-left border-collapse border-2 border-slate-300 mb-12">
                            <thead>
                                <tr class="bg-slate-100 border-b-2 border-slate-300 text-[10px] md:text-[11px] font-extrabold text-slate-800 uppercase tracking-wider">
                                    <th class="p-2 md:p-3 border-r border-slate-300 text-center w-10 md:w-12">Date</th>
                                    <th class="p-2 md:p-3 border-r border-slate-300">Full Date</th>
                                    <th class="p-2 md:p-3 border-r border-slate-300">Day</th>
                                    <th class="p-2 md:p-3 border-r border-slate-300 text-center">Status</th>
                                    <th class="p-2 md:p-3">Reason / Remarks (If Absent)</th>
                                </tr>
                            </thead>
                            <tbody>${rowsHTML}</tbody>
                        </table>
                        
                        <div class="flex justify-between items-end mt-12 md:mt-16 pt-8 border-t-2 border-slate-200">
                            <div class="text-center group relative cursor-pointer">
                                <label>
                                    <input type="file" accept="image/*" onchange="window.handleImageUpload(this, 'adminSignUrl')" class="hidden print:hidden" />
                                    <div class="w-32 md:w-56 border-b-2 border-slate-400 mb-2 h-12 flex items-end justify-center">
                                        ${state.adminSignUrl ? `<img src="${state.adminSignUrl}" class="max-h-12 object-contain" />` : `<span class="text-xs text-slate-300 print:hidden font-medium">Click to Sign</span>`}
                                    </div>
                                    <p class="text-[10px] md:text-sm font-bold text-slate-700 uppercase tracking-wide">Faculty Signature</p>
                                </label>
                            </div>
                            <div class="text-center group relative cursor-pointer">
                                <div class="w-32 md:w-56 border-b-2 border-slate-400 mb-2 h-12 flex items-end justify-center"></div>
                                <p class="text-[10px] md:text-sm font-bold text-slate-700 uppercase tracking-wide">Parent's Signature</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        // --- WHATSAPP MODAL TEMPLATE ---
        function WAModalTemplate() {
            if (!state.waModalConfig) return '';
            return `
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg border border-slate-200 overflow-hidden flex flex-col max-h-[90dvh]">
                    <div class="bg-green-500 p-4 text-white flex items-center justify-between flex-shrink-0">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="message-circle" class="w-5 h-5"></i><h3 class="font-bold text-base md:text-lg">Send WhatsApp Message</h3>
                        </div>
                        <button onclick="window.closeWhatsApp()" class="text-green-100 hover:text-white transition-colors p-1">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <form onsubmit="window.sendWhatsApp(event)" class="p-4 md:p-6 space-y-4 overflow-y-auto flex-1">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5">Recipient Number</label>
                            <div class="flex items-center border border-slate-300 rounded-xl px-3 py-2 bg-slate-50 focus-within:ring-2 focus-within:ring-green-500 focus-within:border-green-500 transition-all">
                                <span class="text-slate-500 font-bold mr-2">+91</span>
                                <input required type="text" value="${state.waModalConfig.phone}" oninput="window.updateWAPhone(this.value)" class="w-full bg-transparent outline-none font-medium text-slate-800 text-sm md:text-base" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5 flex justify-between">
                                <span>Message Content</span><span class="text-slate-400 font-normal">Edit before sending</span>
                            </label>
                            <textarea required rows="7" oninput="window.updateWAMessage(this.value)" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-sm text-slate-700 leading-relaxed transition-all resize-none shadow-inner bg-slate-50">${state.waModalConfig.message}</textarea>
                        </div>
                        <div class="flex flex-col sm:flex-row justify-end space-y-3 sm:space-y-0 sm:space-x-3 pt-2">
                            <button type="button" onclick="window.closeWhatsApp()" class="w-full sm:w-auto px-5 py-3 md:py-2.5 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors text-sm">Cancel</button>
                            <button type="submit" class="w-full sm:w-auto px-6 py-3 md:py-2.5 bg-green-500 text-white font-bold rounded-xl hover:bg-green-600 shadow-md transition-all flex items-center justify-center space-x-2 text-sm">
                                <span>Send via WhatsApp</span><i data-lucide="send" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>`;
        }

    </script>
</body>
</html>
