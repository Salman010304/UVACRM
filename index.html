<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Udaan Vibrant Academy ERP</title>
    
    <!-- PWA Manifest & iOS Apple Touch Icon Links -->
    <link id="manifest-link" rel="manifest">
    <link id="apple-icon" rel="apple-touch-icon">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* --- Attractive Lines Animated Background --- */
        .bg-mesh {
            background-color: #020617;
            background-image: radial-gradient(rgba(249, 115, 22, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: floatOrb 12s ease-in-out infinite alternate;
        }
        .orb-orange { width: 400px; height: 400px; background: #ea580c; top: -100px; left: -100px; }
        .orb-purple { width: 500px; height: 500px; background: #7e22ce; bottom: -150px; right: -100px; animation-delay: -6s; }
        @keyframes floatOrb {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(60px) scale(1.15); }
        }

        /* Custom scrollbar for webkit to make tables look clean */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @media print {
            body { background: white !important; }
            .print\:hidden { display: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:overflow-visible { overflow: visible !important; }
            .print\:bg-white { background-color: white !important; }
            /* Reset mobile margins for print */
            main { margin-bottom: 0 !important; }
        }
    </style>
</head>
<body class="text-slate-800 bg-slate-50 font-sans h-[100dvh] overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDvwI0ImHdQhfyC1kchvg5APLdrvan6L54",
            authDomain: "uvacrm-b417f.firebaseapp.com",
            projectId: "uvacrm-b417f",
            storageBucket: "uvacrm-b417f.firebasestorage.app",
            messagingSenderId: "292694368608",
            appId: "1:292694368608:web:73248adec8a8150764fe05",
            measurementId: "G-C24RR5VWYV"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'uva-erp';

        const SKILL_COURSES = {
            "AI Master Combo": { duration: "1 Month" },
            "Prompt Engineering Mastery": { duration: "1 Month" },
            "AI Content Creation Mastery": { duration: "1 Month" },
            "AI Productivity & Smart Work": { duration: "1 Month" },
            "AI Career Skills Program": { duration: "1 Month+" },
            "Career Starter Pack (Comp+Eng+Excel)": { duration: "3 Months" },
            "Creative Designing Course": { duration: "2 Months" },
            "Advanced Excel Mastery": { duration: "2 Months" },
            "Accounting & Tally Prime": { duration: "2 Months" },
            "Smart Computer Skills": { duration: "2 Months" },
            "English Communication Mastery": { duration: "2 Months" },
            "Presentation Skills Mastery": { duration: "2 Months" }
        };

        const TUITION_CLASSES = ["STD 9", "STD 10", "STD 11 Commerce", "STD 12 Commerce"];
        const LEAD_SOURCES = ["Flyer", "Instagram", "Banner", "Reference", "Walk-in", "Other"];

        const defaultAppIcon = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><rect width='200' height='200' rx='40' fill='%23ea580c'/><text x='100' y='115' font-family='Arial' font-size='70' font-weight='900' fill='%23ffffff' text-anchor='middle'>UVA</text><text x='100' y='150' font-family='Arial' font-size='18' font-weight='bold' fill='%23ffffff' text-anchor='middle' letter-spacing='3'>APP</text></svg>";
        const defaultFormLogo = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><rect width='200' height='200' rx='30' fill='%230f172a'/><text x='100' y='110' font-family='Arial' font-size='65' font-weight='900' fill='%23f97316' text-anchor='middle'>UVA</text><text x='100' y='145' font-family='Arial' font-size='16' font-weight='normal' fill='%23ffffff' text-anchor='middle' letter-spacing='2'>ACADEMY</text></svg>";

        const state = {
            isAuthLoading: true,
            user: null,
            loginError: '',
            activeTab: 'dashboard',
            appIconUrl: defaultAppIcon,
            formLogoUrl: defaultFormLogo,
            adminSignUrl: null, // Global Authorized Signatory
            inquiries: [],
            students: [],
            showNewInquiryForm: false,
            newInquiryData: { name: '', phone: '', type: 'Skill', course: '', std: '', board: '', medium: '', source: 'Flyer', inquiryDate: new Date().toISOString().split('T')[0] },
            enrollingLead: null,
            receiptData: null,
            attendanceReportData: null,
            waModalConfig: null,
            attFilterCategory: 'All',
            attSelectedBatch: '',
            attDate: new Date().toISOString().split('T')[0],
            attReportMonth: new Date().toISOString().slice(0, 7),
            attState: {},
            admSearchQuery: '',
            admProgramFilter: 'All',
            admCourseFilter: 'All',
            admOfferFilter: 'All',
            canInstall: false,
            editingInquiryId: null,
            editingStudentData: null
        };

        let unsubSnapshot = null;

        // Initialize App and Setup Listeners
        async function initApp() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    // Using normal email/password flow so no anonymous signin here
                    // Wait for the auth state change listener to resolve
                }
            } catch (error) {
                console.error("Auth init failed:", error);
                state.isAuthLoading = false;
                render();
            }
        }

        onAuthStateChanged(auth, user => {
            state.isAuthLoading = false;
            state.user = user;
            if (user && user.uid !== 'bypassed_user') {
                setupRealtimeSync(user.uid);
            } else if(user && user.uid === 'bypassed_user') {
                 window.loadDataFromCloud('bypassed_user');
            } else {
                if (unsubSnapshot) {
                    unsubSnapshot();
                    unsubSnapshot = null;
                }
                render();
            }
        });

        // Setup real-time listener for cloud sync
        function setupRealtimeSync(uid) {
             const docRef = doc(db, 'artifacts', appId, 'users', uid, 'data', 'erp_state');
             
             if (unsubSnapshot) unsubSnapshot(); // Clear existing
             
             unsubSnapshot = onSnapshot(docRef, (docSnap) => {
                 if (docSnap.exists()) {
                     const data = docSnap.data();
                     // We merge data, prioritizing local edits if they are happening, 
                     // but for this simple app, overwriting is fine for real-time sync across devices
                     state.appIconUrl = data.appIconUrl || defaultAppIcon;
                     state.formLogoUrl = data.formLogoUrl || defaultFormLogo;
                     state.adminSignUrl = data.adminSignUrl || null;
                     state.inquiries = data.inquiries || [];
                     state.students = data.students || [];
                     state.attState = data.attState || {};
                     console.log("Real-time update received from Cloud");
                 }
                 render();
             }, (error) => {
                 console.error("Real-time sync error:", error);
                 // We don't render on error to avoid flashing error states if it's transient
             });
        }


        let syncTimeout;
        window.saveDataToCloud = async () => {
            const dataToSave = {
                appIconUrl: state.appIconUrl,
                formLogoUrl: state.formLogoUrl,
                adminSignUrl: state.adminSignUrl || null,
                inquiries: state.inquiries,
                students: state.students,
                attState: state.attState
            };

            // Handle Bypass Test Mode (Local Storage fallback)
            if (state.user && state.user.uid === 'bypassed_user') {
                localStorage.setItem('uva_erp_data', JSON.stringify(dataToSave));
                return;
            }

            if (!state.user) return;

            // Debounce the save to prevent hammering Firestore
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'data', 'erp_state');
                    await setDoc(docRef, dataToSave, { merge: true });
                    console.log("Synced to Cloud Successfully");
                } catch (e) {
                    console.error("Cloud Sync Failed", e);
                }
            }, 500); // 500ms debounce
        };

        window.loadDataFromCloud = async (uid) => {
            try {
                if (uid === 'bypassed_user') {
                    const stored = localStorage.getItem('uva_erp_data');
                    if (stored) {
                        const data = JSON.parse(stored);
                        Object.assign(state, data);
                    }
                    render();
                } else {
                    // For logged-in users, the real-time listener (onSnapshot) handles loading
                    // But we can trigger an initial render here just in case
                    render();
                }
            } catch (e) {
                console.error("Failed to load from Cloud", e);
                render();
            }
        };

        function render() {
            document.getElementById('root').innerHTML = AppTemplate();
            if(window.lucide) lucide.createIcons();
            const mainContent = document.getElementById('main-scroll-area');
            if (mainContent && !state.receiptData && !state.attendanceReportData) mainContent.scrollTop = 0;
        }

        window.handleLogin = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const email = fd.get('email');
            const password = fd.get('password');
            state.loginError = '';
            state.isAuthLoading = true; // Show loading
            render(); 

            signInWithEmailAndPassword(auth, email, password).catch(error => {
                state.isAuthLoading = false;
                state.loginError = error.message;
                render();
            });
        };

        window.bypassLogin = () => {
            state.user = { email: 'admin@uva.com (Bypassed)', uid: 'bypassed_user' };
            window.loadDataFromCloud('bypassed_user');
        };

        window.handleLogout = () => {
            if(state.user && state.user.uid === 'bypassed_user') {
                state.user = null;
                render();
            } else {
                signOut(auth);
            }
        };

        window.switchTab = (tab) => {
            state.activeTab = tab;
            state.receiptData = null;
            state.attendanceReportData = null;
            render();
        };

        window.openWhatsApp = (phone, type, name, courseName) => {
            let message = "";
            if (type === 'welcome_inquiry') {
                message = `Hello ${name},\n\nWelcome to *Udaan Vibrant Academy (UVA)*! 🚀\nThank you for your inquiry regarding our ${courseName} course. Where learning takes flight!\n\nLet us know when you'd like to schedule a visit.`;
            } else if (type === 'followup_inquiry') {
                message = `Hello ${name},\n\nWe noticed your interest in the *${courseName}* at Udaan Vibrant Academy! 🌟\n\nSeats are filling up fast for our upcoming batch. Do you have any questions?\n\nLet's build your future together! 🚀`;
            } else if (type === 'absent_alert') {
                message = `Dear Parent/Student,\n\nNotice from UVA: ${name} was marked ABSENT today for the ${courseName} batch. Regular attendance is crucial for success!\n\nRegards,\nUdaan Vibrant Academy`;
            }
            state.waModalConfig = { phone, message };
            render();
        };

        window.closeWhatsApp = () => { state.waModalConfig = null; render(); };
        window.updateWAMessage = (val) => { state.waModalConfig.message = val; };
        window.updateWAPhone = (val) => { state.waModalConfig.phone = val; };
        
        window.sendWhatsApp = (e) => {
            e.preventDefault();
            if (!state.waModalConfig) return;
            const encodedMessage = encodeURIComponent(state.waModalConfig.message);
            const whatsappUrl = `https://wa.me/91${state.waModalConfig.phone}?text=${encodedMessage}`;
            window.open(whatsappUrl, '_blank');
            window.closeWhatsApp();
        };

        window.toggleInquiryForm = () => {
            state.showNewInquiryForm = !state.showNewInquiryForm;
            if (!state.showNewInquiryForm) {
                state.editingInquiryId = null;
                state.newInquiryData = { name: '', phone: '', type: 'Skill', course: '', std: '', board: '', medium: '', source: 'Flyer', inquiryDate: new Date().toISOString().split('T')[0] };
            }
            render();
        };

        window.updateNewInquiryData = (key, val) => {
            state.newInquiryData[key] = val;
            if(key === 'type') render(); 
        };

        window.saveInquiry = (e) => {
            e.preventDefault();
            if (state.editingInquiryId) {
                const index = state.inquiries.findIndex(i => i.id === state.editingInquiryId);
                if (index !== -1) {
                    state.inquiries[index] = { ...state.inquiries[index], ...state.newInquiryData, date: state.newInquiryData.inquiryDate };
                }
                state.editingInquiryId = null;
            } else {
                state.inquiries.push({
                    ...state.newInquiryData,
                    id: `INQ-${Math.floor(Math.random() * 1000)}`,
                    status: 'New',
                    date: state.newInquiryData.inquiryDate || new Date().toISOString().split('T')[0]
                });
            }
            state.showNewInquiryForm = false;
            state.newInquiryData = { name: '', phone: '', type: 'Skill', course: '', std: '', board: '', medium: '', source: 'Flyer', inquiryDate: new Date().toISOString().split('T')[0] };
            window.saveDataToCloud();
            render();
        };

        window.editInquiry = (id) => {
            const inq = state.inquiries.find(i => i.id === id);
            if (inq) {
                state.newInquiryData = { ...inq, inquiryDate: inq.date };
                state.editingInquiryId = id;
                state.showNewInquiryForm = true;
                render();
            }
        };

        window.deleteInquiry = (id) => {
            if (confirm("Are you sure you want to delete this inquiry?")) {
                state.inquiries = state.inquiries.filter(i => i.id !== id);
                window.saveDataToCloud();
                render();
            }
        };

        window.updateInquiryStatus = (id, val) => {
            const inq = state.inquiries.find(i => i.id === id);
            if(inq) inq.status = val;
            window.saveDataToCloud();
            render();
        };

        window.openEnrollModal = (id) => {
            state.enrollingLead = state.inquiries.find(i => i.id === id);
            render();
        };

        window.closeEnrollModal = () => {
            state.enrollingLead = null;
            render();
        };

        window.confirmEnroll = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const newStudent = {
                id: `UVA-${Math.floor(1000 + Math.random() * 9000)}`,
                name: state.enrollingLead.name,
                phone: state.enrollingLead.phone,
                type: state.enrollingLead.type,
                course: state.enrollingLead.course,
                std: state.enrollingLead.std,
                board: state.enrollingLead.board,
                medium: state.enrollingLead.medium,
                date: fd.get('joiningDate') || new Date().toISOString().split('T')[0],
                dob: fd.get('dob') || 'Not Provided',
                gender: fd.get('gender') || 'Not Specified',
                bloodGroup: fd.get('bloodGroup') || '-',
                address: fd.get('address') || 'Not Provided',
                batchTiming: fd.get('batchTiming') || 'To be assigned',
                parentName: fd.get('parentName') || 'Not Provided',
                parentPhone: fd.get('parentPhone') || '-',
                parentOccupation: fd.get('parentOccupation') || '-',
                parentEmail: fd.get('parentEmail') || '-',
                freeOffer: fd.get('freeOffer') || 'None',
                photoUrl: null,
                studentSignUrl: null,
                parentSignUrl: null
            };
            
            state.students.push(newStudent);
            const inq = state.inquiries.find(i => i.id === state.enrollingLead.id);
            if(inq) inq.status = 'Enrolled';
            
            const name = state.enrollingLead.name;
            state.enrollingLead = null;
            window.saveDataToCloud();
            render();
            alert(`${name} successfully enrolled! Check Admissions tab to view or print form.`);
        };

        window.openReceipt = (id) => {
            state.receiptData = state.students.find(s => s.id === id);
            render();
        };
        window.closeReceipt = () => { state.receiptData = null; render(); };

        window.openEditStudentModal = (id) => {
            state.editingStudentData = { ...state.students.find(s => s.id === id) };
            render();
        };

        window.closeEditStudentModal = () => {
            state.editingStudentData = null;
            render();
        };

        window.confirmEditStudent = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const index = state.students.findIndex(s => s.id === state.editingStudentData.id);
            if (index !== -1) {
                state.students[index] = {
                    ...state.students[index],
                    name: fd.get('name') || state.students[index].name,
                    phone: fd.get('phone') || state.students[index].phone,
                    date: fd.get('joiningDate') || state.students[index].date,
                    dob: fd.get('dob') || state.students[index].dob,
                    gender: fd.get('gender') || state.students[index].gender,
                    bloodGroup: fd.get('bloodGroup') || state.students[index].bloodGroup,
                    batchTiming: fd.get('batchTiming') || state.students[index].batchTiming,
                    freeOffer: fd.get('freeOffer') || state.students[index].freeOffer,
                    address: fd.get('address') || state.students[index].address,
                    parentName: fd.get('parentName') || state.students[index].parentName,
                    parentPhone: fd.get('parentPhone') || state.students[index].parentPhone,
                    parentOccupation: fd.get('parentOccupation') || state.students[index].parentOccupation,
                    parentEmail: fd.get('parentEmail') || state.students[index].parentEmail,
                };
            }
            state.editingStudentData = null;
            window.saveDataToCloud();
            render();
            alert('Student details updated successfully!');
        };

        window.deleteStudent = (id) => {
            if (confirm("Are you sure you want to completely delete this student record? This action cannot be undone.")) {
                state.students = state.students.filter(s => s.id !== id);
                window.saveDataToCloud();
                render();
            }
        };

        window.handleImageUpload = (input, type, studentId = null) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = async (e) => { 
                    const base64 = e.target.result;
                    if (studentId) {
                        const std = state.students.find(s => s.id === studentId);
                        if (std) {
                            std[type] = base64; // photoUrl, studentSignUrl, parentSignUrl
                        }
                    } else {
                        state[type] = base64; // formLogoUrl, appIconUrl, adminSignUrl
                        if(type === 'appIconUrl') setupPWA();
                    }
                    await window.saveDataToCloud();
                    render(); 
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.resetAttState = (studentsToReset) => {
            state.attState = {};
            studentsToReset.forEach(s => {
                state.attState[s.id] = { status: 'Present', reason: '' };
            });
        };

        window.updateAttFilter = (val) => {
            state.attFilterCategory = val;
            state.attSelectedBatch = '';
            render();
        };

        window.updateAttBatch = (val) => {
            state.attSelectedBatch = val;
            const currentStudents = getFilteredStudents();
            window.resetAttState(currentStudents);
            render();
        };

        window.updateAttDate = (val) => {
            state.attDate = val;
            window.resetAttState(getFilteredStudents());
            render();
        };

        window.updateAttMonth = (val) => {
            state.attReportMonth = val;
            render();
        };

        window.toggleAttendance = (id, status) => {
            if (!state.attState[id]) state.attState[id] = { status: 'Present', reason: '' };
            state.attState[id].status = status;
            window.saveDataToCloud(); // Save immediately for Real-time UX
            render();
        };

        window.updateAttReason = (id, val) => {
            if (state.attState[id]) state.attState[id].reason = val;
            window.saveDataToCloud(); // Save immediately but don't re-render to keep select focus
        };

        window.clearAttendance = () => {
            if (confirm("Are you sure you want to clear/delete the attendance marks for this batch?")) {
                const currentStudents = getFilteredStudents();
                currentStudents.forEach(s => {
                    delete state.attState[s.id];
                });
                window.saveDataToCloud();
                render();
            }
        };

        window.notifyAbsentees = () => {
            const filtered = getFilteredStudents();
            const absentees = filtered.filter(s => state.attState[s.id]?.status === 'Absent');
            if(absentees.length === 0) {
                alert("No absentees to notify!"); return;
            }
            window.openWhatsApp(absentees[0].phone, 'absent_alert', absentees[0].name, state.attSelectedBatch);
        };

        window.openAttendanceReport = () => {
            state.attendanceReportData = {
                batch: state.attSelectedBatch,
                students: getFilteredStudents(),
                month: state.attReportMonth,
                category: state.attFilterCategory === 'Skill' ? 'Professional & AI Skills' : state.attFilterCategory === 'Tuition' ? 'Academic Tuition' : 'General Program',
                state: state.attState,
                date: new Date(state.attDate).toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
            };
            render();
        };
        window.closeAttendanceReport = () => { state.attendanceReportData = null; render(); };

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            deferredPrompt = e; 
            state.canInstall = true; 
            render();
        });

        window.installPWA = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    state.canInstall = false;
                }
                deferredPrompt = null;
                render();
            }
        };

        function setupPWA() {
            const appleIcon = document.getElementById('apple-icon');
            if (appleIcon) appleIcon.href = state.appIconUrl;

            const manifest = {
                name: "UVA ERP",
                short_name: "UVA ERP",
                description: "Udaan Vibrant Academy ERP",
                start_url: location.href,
                display: "standalone",
                background_color: "#f8fafc",
                theme_color: "#0f172a",
                icons: [
                    { src: state.appIconUrl, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
                    { src: state.appIconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
                ]
            };
            
            const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
            document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', (e) => {
                    e.respondWith(fetch(e.request).catch(() => new Response('Offline Mode Active. Please connect to internet.')));
                });
            `;
            const swBlob = new Blob([swCode], {type: 'text/javascript'});
            
            if ('serviceWorker' in navigator) {

                                <option value="">Select Medium</option>
                                <option value="Gujarati" ${d.medium==='Gujarati'?'selected':''}>Gujarati</option>
                                <option value="English" ${d.medium==='English'?'selected':''}>English</option>
                            </select>
                        </div>
                    </div>`;
                }

                const formTitle = state.editingInquiryId ? 'Update Lead Details' : 'Capture Lead Details';
                const submitBtn = state.editingInquiryId ? 'Update Lead' : 'Save Lead';

                formHTML = `
                <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 md:mb-8 animate-fade-in">
                    <h3 class="text-base md:text-lg font-bold text-slate-800 mb-4 border-b pb-3">${formTitle}</h3>
                    <form onsubmit="saveInquiry(event)" class="space-y-4 md:space-y-5">
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-5">
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-1.5">Student Name</label>
                                <input required type="text" value="${d.name}" oninput="updateNewInquiryData('name', this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none transition-all text-sm" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-1.5">WhatsApp Number</label>
                                <input required type="text" value="${d.phone}" oninput="updateNewInquiryData('phone', this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none transition-all text-sm" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-1.5">Inquiry Date</label>
                                <input required type="date" value="${d.inquiryDate}" onchange="updateNewInquiryData('inquiryDate', this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none transition-all text-sm" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-1.5">Lead Source</label>
                                <select onchange="updateNewInquiryData('source', this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none transition-all text-sm">
                                    ${LEAD_SOURCES.map(s => `<option value="${s}" ${d.source===s?'selected':''}>${s}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <div class="p-4 md:p-5 bg-slate-50 border border-slate-200 rounded-xl">
                            <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-6 mb-5">
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="radio" name="progType" onchange="updateNewInquiryData('type', 'Skill')" ${d.type==='Skill'?'checked':''} class="w-4 h-4 text-orange-500 focus:ring-orange-500 border-slate-300" />
                                    <span class="font-bold text-slate-700 text-sm">Skills & AI Academy</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="radio" name="progType" onchange="updateNewInquiryData('type', 'Tuition')" ${d.type==='Tuition'?'checked':''} class="w-4 h-4 text-orange-500 focus:ring-orange-500 border-slate-300" />
                                    <span class="font-bold text-slate-700 text-sm">Academic Tuition (9-12)</span>
                                </label>
                            </div>
                            ${dynamicFields}
                        </div>

                        <div class="flex flex-col sm:flex-row justify-end space-y-3 sm:space-y-0 sm:space-x-4 pt-2">
                            <button type="button" onclick="toggleInquiryForm()" class="w-full sm:w-auto px-5 py-3 sm:py-2.5 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors text-sm">Cancel</button>
                            <button type="submit" class="w-full sm:w-auto px-6 py-3 sm:py-2.5 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-colors shadow-md text-sm">${submitBtn}</button>
                        </div>
                    </form>
                </div>`;
            }

            let tableHTML = state.inquiries.map(inq => {
                const badgeClass = inq.type === 'Skill' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700';
                const statusClass = inq.status === 'Enrolled' ? 'bg-green-50 text-green-700 border-green-200' :
                                    inq.status === 'New' ? 'bg-blue-50 text-blue-700 border-blue-200' :
                                    inq.status === 'Closed' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-orange-50 text-orange-700 border-orange-200';
                
                const interestStr = inq.type === 'Skill' ? inq.course : `${inq.std} | ${inq.board} | ${inq.medium}`;
                
                let actionsHTML = `
                    <button title="Send WhatsApp Welcome" onclick="openWhatsApp('${inq.phone}', 'welcome_inquiry', '${inq.name}', '${interestStr}')" class="p-2 text-green-600 hover:bg-green-100 rounded-lg transition-colors">
                        <i data-lucide="message-circle" class="w-5 h-5 md:w-4 md:h-4"></i>
                    </button>
                `;
                
                if (inq.status !== 'Enrolled' && inq.status !== 'Closed') {
                    actionsHTML += `
                        <button title="Send WhatsApp Follow-up" onclick="openWhatsApp('${inq.phone}', 'followup_inquiry', '${inq.name}', '${interestStr}')" class="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors">
                            <i data-lucide="message-circle" class="w-5 h-5 md:w-4 md:h-4"></i>
                        </button>
                        <button onclick="openEnrollModal('${inq.id}')" class="ml-2 px-3 py-1.5 md:px-4 md:py-1.5 bg-slate-900 text-white text-xs md:text-sm font-bold rounded-lg hover:bg-slate-800 shadow-sm transition-colors whitespace-nowrap">
                            Enroll Now
                        </button>
                    `;
                } else if (inq.status === 'Enrolled') {
                    actionsHTML += `
                        <span class="ml-2 flex items-center text-green-600 font-bold text-xs md:text-sm bg-green-50 px-2 md:px-3 py-1.5 rounded-lg border border-green-200 inline-flex whitespace-nowrap">
                            <i data-lucide="check-circle" class="w-4 h-4 mr-1"></i> Enrolled
                        </span>
                    `;
                }

                actionsHTML += `
                    <button onclick="editInquiry('${inq.id}')" title="Edit Inquiry" class="ml-2 p-2 text-slate-500 hover:bg-slate-100 hover:text-blue-600 rounded-lg transition-colors">
                        <i data-lucide="pencil" class="w-5 h-5 md:w-4 md:h-4"></i>
                    </button>
                    <button onclick="deleteInquiry('${inq.id}')" title="Delete Inquiry" class="p-2 text-slate-500 hover:bg-slate-100 hover:text-red-600 rounded-lg transition-colors">
                        <i data-lucide="trash-2" class="w-5 h-5 md:w-4 md:h-4"></i>
                    </button>
                `;

                return `
                <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0">
                    <td class="p-3 sm:p-4 align-top whitespace-nowrap">
                        <p class="font-bold text-slate-800 text-sm">${inq.name}</p>
                        <p class="text-xs text-slate-500 font-medium mt-0.5">${inq.phone}</p>
                        <p class="text-[10px] text-slate-400 mt-1 font-medium bg-slate-100 inline-block px-2 py-0.5 rounded border border-slate-200">Inq: ${new Date(inq.date).toLocaleDateString('en-IN')}</p>
                    </td>
                    <td class="p-3 sm:p-4 align-top whitespace-nowrap max-w-[150px] sm:max-w-[200px] md:max-w-none truncate">
                        <span class="inline-block px-2 py-0.5 rounded text-[10px] uppercase tracking-widest font-bold mb-1 ${badgeClass}">${inq.type}</span>
                        <p class="text-xs sm:text-sm font-bold text-slate-700 truncate" title="${interestStr}">${interestStr}</p>
                    </td>
                    <td class="p-3 sm:p-4 text-xs sm:text-sm font-medium text-slate-600 align-top whitespace-nowrap">${inq.source}</td>
                    <td class="p-3 sm:p-4 align-top whitespace-nowrap">
                        <select onchange="updateInquiryStatus('${inq.id}', this.value)" class="text-xs md:text-sm border rounded-lg p-1.5 md:p-2 font-bold outline-none cursor-pointer w-full md:w-auto ${statusClass}">
                            <option value="New" ${inq.status==='New'?'selected':''}>New</option>
                            <option value="Demo" ${inq.status==='Demo'?'selected':''}>Demo Attended</option>
                            <option value="Follow-Up" ${inq.status==='Follow-Up'?'selected':''}>Follow-Up</option>
                            <option value="Enrolled" ${inq.status==='Enrolled'?'selected':''} disabled>Enrolled</option>
                            <option value="Closed" ${inq.status==='Closed'?'selected':''}>Closed</option>
                        </select>
                    </td>
                    <td class="p-3 sm:p-4 text-right flex justify-end items-center space-x-0.5 md:space-x-1 align-top whitespace-nowrap">${actionsHTML}</td>
                </tr>`;
            }).join('');
            if(!tableHTML) tableHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-500 font-medium text-sm">No inquiries found.</td></tr>`;

            return `
            <div class="p-4 sm:p-6 md:p-8 relative min-h-full animate-fade-in">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 md:mb-8 gap-4">
                    <div>
                        <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">Inquiries & CRM</h2>
                        <p class="text-sm md:text-base text-slate-500 font-medium mt-1">Manage leads, track status, and enroll students.</p>
                    </div>
                    <button onclick="toggleInquiryForm()" class="w-full sm:w-auto bg-orange-500 text-white px-5 py-3 sm:py-2.5 rounded-xl flex items-center justify-center space-x-2 hover:bg-orange-600 font-bold shadow-md transition-colors">
                        <i data-lucide="plus" class="w-5 h-5"></i> <span>New Inquiry</span>
                    </button>
                </div>
                ${formHTML}
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto w-full">
                    <table class="w-full min-w-[700px] text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-[10px] sm:text-xs uppercase tracking-wider text-slate-500 font-bold">
                                <th class="p-3 sm:p-4">Name & Contact</th><th class="p-3 sm:p-4">Interest (Course/Class)</th><th class="p-3 sm:p-4">Source</th><th class="p-3 sm:p-4">Status</th><th class="p-3 sm:p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody>${tableHTML}</tbody>
                    </table>
                </div>
                ${EnrollModalTemplate()}
            </div>`;
        }

        function EnrollModalTemplate() {
            if (!state.enrollingLead) return '';
            const l = state.enrollingLead;
            const programName = l.type === 'Skill' ? l.course : `${l.std} ${l.board}`;
            
            return `
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-3 sm:p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[85vh] md:max-h-[90vh] overflow-y-auto border border-slate-200">
                    <div class="p-4 md:p-6 border-b border-slate-200 flex justify-between items-center bg-slate-50 sticky top-0 z-10">
                        <div>
                            <h3 class="text-lg md:text-xl font-extrabold text-slate-800">Complete Admission Details</h3>
                            <p class="text-xs md:text-sm text-slate-500 mt-1 font-medium">Enrolling <span class="font-bold text-orange-600">${l.name}</span> into <br class="md:hidden"/>${programName}</p>
                        </div>
                        <button type="button" onclick="closeEnrollModal()" class="p-2 text-slate-400 hover:bg-slate-200 hover:text-slate-700 rounded-full transition-colors">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <form onsubmit="confirmEnroll(event)" class="p-4 md:p-8 space-y-6 md:space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                            <!-- Student Details -->
                            <div class="space-y-4 md:space-y-5">
                                <h4 class="font-bold text-slate-800 border-b-2 border-slate-100 pb-2 flex items-center text-sm md:text-base"><i data-lucide="user-plus" class="w-4 h-4 mr-2 text-orange-500"></i> Student Information</h4>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-5">
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Joining Date</label><input required type="date" name="joiningDate" value="${new Date().toISOString().split('T')[0]}" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-sm font-medium text-slate-700" /></div>
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Date of Birth</label><input type="date" name="dob" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-sm font-medium text-slate-700" /></div>
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Gender</label>
                                        <select name="gender" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700">
                                            <option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option>
                                        </select>
                                    </div>
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Blood Group</label>
                                        <select name="bloodGroup" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700">
                                            <option value="">Select</option><option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="O+">O+</option><option value="O-">O-</option><option value="AB+">AB+</option><option value="AB-">AB-</option>
                                        </select>
                                    </div>
                                    <div class="sm:col-span-2"><label class="block text-xs font-bold text-slate-600 mb-1">Preferred Batch</label><input type="text" name="batchTiming" placeholder="e.g. 4 PM - 6 PM" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                    <div class="sm:col-span-2"><label class="block text-xs font-bold text-slate-600 mb-1">Free Add-on Course (Offer)</label><input type="text" name="freeOffer" placeholder="e.g. Soft Skills (Free) or None" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                </div>
                                <div><label class="block text-xs font-bold text-slate-600 mb-1">Residential Address</label><textarea rows="2" name="address" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700"></textarea></div>
                            </div>
                            <!-- Parent Details -->
                            <div class="space-y-4 md:space-y-5">
                                <h4 class="font-bold text-slate-800 border-b-2 border-slate-100 pb-2 flex items-center text-sm md:text-base"><i data-lucide="users" class="w-4 h-4 mr-2 text-orange-500"></i> Parent / Guardian Info</h4>
                                <div><label class="block text-xs font-bold text-slate-600 mb-1">Parent's Full Name</label><input type="text" name="parentName" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-5">
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Parent's Phone</label><input type="text" name="parentPhone" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Occupation</label><input type="text" name="parentOccupation" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                </div>
                                <div><label class="block text-xs font-bold text-slate-600 mb-1">Parent's Email</label><input type="email" name="parentEmail" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row justify-end space-y-3 sm:space-y-0 sm:space-x-4 pt-4 border-t border-slate-100">
                            <button type="button" onclick="closeEnrollModal()" class="w-full sm:w-auto px-6 py-3 md:py-2.5 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors text-sm">Cancel</button>
                            <button type="submit" class="w-full sm:w-auto px-8 py-3 md:py-2.5 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 shadow-xl shadow-slate-900/20 transition-all flex items-center justify-center text-sm">
                                <i data-lucide="check-circle" class="w-4 h-4 mr-2"></i> Confirm Admission
                            </button>
                        </div>
                    </form>
                </div>
            </div>`;
        }

        function AdmissionsTemplate() {
            // Determine active courses for filter dropdown
            const activeCourses = [...new Set(state.students
                .filter(s => state.admProgramFilter === 'All' || s.type === state.admProgramFilter)
                .map(s => s.type === 'Skill' ? s.course : `${s.std} ${s.board} ${s.medium}`)
            )];

            // Filter students based on all selected criteria
            let filteredStudents = state.students.filter(std => {
                const matchesSearch = std.name.toLowerCase().includes(state.admSearchQuery.toLowerCase()) || std.id.toLowerCase().includes(state.admSearchQuery.toLowerCase());
                const matchesProgram = state.admProgramFilter === 'All' || std.type === state.admProgramFilter;
                const stdCourse = std.type === 'Skill' ? std.course : `${std.std} ${std.board} ${std.medium}`;
                const matchesCourse = state.admCourseFilter === 'All' || stdCourse === state.admCourseFilter;
                
                const hasOffer = std.freeOffer && std.freeOffer !== 'None';
                const matchesOffer = state.admOfferFilter === 'All' || 
                                    (state.admOfferFilter === 'With Offer' ? hasOffer : !hasOffer);

                return matchesSearch && matchesProgram && matchesCourse && matchesOffer;
            });

            let stdHTML = filteredStudents.map(std => {
                const courseName = std.type === 'Skill' ? std.course : `${std.std} | ${std.board} (${std.medium} Med.)`;
                const offerBadge = (std.freeOffer && std.freeOffer !== 'None') ? `<p class="text-[10px] md:text-xs text-orange-600 font-bold mt-1.5 bg-orange-50 inline-block px-2.5 py-0.5 rounded border border-orange-200">Offer Applied: ${std.freeOffer}</p>` : '';
                return `
                <div class="bg-white p-4 md:p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between md:items-center gap-4 md:gap-6 hover:shadow-md transition-shadow">
                    <div class="flex-1">
                        <div class="flex items-center space-x-3 mb-1.5">
                            <h3 class="text-lg md:text-xl font-extrabold text-slate-800">${std.name}</h3>
                            <span class="text-[10px] md:text-xs font-bold font-mono bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md border border-slate-200">${std.id}</span>
                        </div>
                        <p class="text-xs md:text-sm text-slate-600 font-bold mb-1 leading-snug">${courseName}</p>
                        <p class="text-[10px] md:text-xs text-slate-400 font-medium">Phone: +91 ${std.phone} • Enrolled: ${std.date}</p>
                        ${offerBadge}
                    </div>
                    <div class="flex space-x-2 md:space-x-3 pt-3 md:pt-0 border-t border-slate-100 md:border-0 mt-3 md:mt-0 w-full md:w-auto">
                        <button onclick="openEditStudentModal('${std.id}')" title="Edit Student" class="flex-1 md:flex-none md:w-auto px-4 py-3 md:py-2.5 bg-slate-100 text-slate-600 rounded-xl text-sm font-bold hover:bg-slate-200 hover:text-slate-800 flex items-center justify-center space-x-1 transition-all">
                            <i data-lucide="pencil" class="w-4 h-4 md:w-5 md:h-5"></i><span class="md:hidden lg:inline text-xs">Edit</span>
                        </button>
                        <button onclick="deleteStudent('${std.id}')" title="Delete Student" class="flex-1 md:flex-none md:w-auto px-4 py-3 md:py-2.5 bg-red-50 text-red-500 rounded-xl text-sm font-bold hover:bg-red-100 hover:text-red-600 flex items-center justify-center space-x-1 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4 md:w-5 md:h-5"></i><span class="md:hidden lg:inline text-xs">Delete</span>
                        </button>
                        <button onclick="openReceipt('${std.id}')" class="flex-1 md:flex-none md:w-auto px-5 py-3 md:py-2.5 bg-orange-500 text-white rounded-xl text-sm font-bold hover:bg-orange-600 flex items-center justify-center space-x-2 shadow-md shadow-orange-500/20 transition-all">
                            <i data-lucide="file-text" class="w-4 h-4 md:w-5 md:h-5"></i> <span>Form</span>
                        </button>
                    </div>
                </div>`;
            }).join('');

            if(filteredStudents.length === 0) stdHTML = `<div class="p-8 md:p-10 text-center text-slate-500 font-medium bg-white rounded-2xl border border-dashed border-slate-300 text-sm md:text-base">No students found matching your filters.</div>`;

            return `
            <div class="p-4 sm:p-6 md:p-8 min-h-full animate-fade-in">
                <div class="mb-6 md:mb-8">
                    <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">Admissions</h2>
                    <p class="text-sm md:text-base text-slate-500 font-medium mt-1">Manage enrolled students, print forms, and search.</p>
                </div>

                <!-- Admissions Filters -->
                <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 md:mb-8">
                    <h3 class="text-sm font-bold text-slate-800 mb-4 border-b pb-2 uppercase tracking-wider">Filter Records</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">Search Student</label>
                            <div class="relative">
                                <i data-lucide="search" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
                                <input type="text" placeholder="Name or ID..." value="${state.admSearchQuery}" oninput="updateAdmSearch(this.value)" class="w-full pl-9 p-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none font-bold text-slate-700 transition-all shadow-sm text-sm" />
                            </div>

        function AttendanceReportViewTemplate() {
            const data = state.attendanceReportData;
            const formattedMonth = new Date(data.month + '-01').toLocaleString('en-IN', { month: 'long', year: 'numeric' });

            const getMonthlyStats = (studentId) => {
                let hash = 0; for (let i = 0; i < studentId.length; i++) hash += studentId.charCodeAt(i);
                const totalWorkingDays = 24; 
                const presentDays = 18 + (hash % 7); 
                const absentDays = totalWorkingDays - presentDays;
                const percentage = Math.round((presentDays / totalWorkingDays) * 100);
                return { totalWorkingDays, presentDays, absentDays, percentage };
            };

            let totalBatchPercentage = 0;
            data.students.forEach(std => { totalBatchPercentage += getMonthlyStats(std.id).percentage; });
            const avgAttendance = data.students.length > 0 ? Math.round(totalBatchPercentage / data.students.length) : 0;

            const presentCount = data.students.filter(s => (data.state[s.id]?.status || 'Present') === 'Present').length;
            const absentCount = data.students.filter(s => data.state[s.id]?.status === 'Absent').length;

            let stdHTML = data.students.map((std, index) => {
                const stats = getMonthlyStats(std.id);
                return `
                <tr class="border-b border-slate-200 text-xs md:text-sm">
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-bold text-slate-500">${index + 1}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 font-mono font-bold text-slate-600">${std.id}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 font-extrabold text-slate-900">${std.name}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-bold text-slate-700">${stats.totalWorkingDays}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-extrabold text-green-600">${stats.presentDays}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-bold text-red-500">${stats.absentDays}</td>
                    <td class="p-2 md:p-3.5 text-center">
                        <span class="px-2 md:px-3 py-1 rounded-full text-[10px] md:text-xs font-extrabold tracking-wide ${stats.percentage >= 75 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${stats.percentage}%</span>
                    </td>
                </tr>`;
            }).join('');
            if(data.students.length === 0) stdHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-500 font-medium">No students to report for this month.</td></tr>`;

            return `
            <div class="p-4 sm:p-8 max-w-5xl mx-auto bg-gray-50 min-h-[100dvh] print:p-0 print:bg-white animate-fade-in">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-6 print:hidden gap-3">
                    <button onclick="closeAttendanceReport()" class="w-full sm:w-auto px-5 py-2.5 bg-white border border-slate-300 rounded-xl hover:bg-slate-50 font-bold shadow-sm text-slate-700 transition-colors">← Back</button>
                    <button onclick="window.print()" class="w-full sm:w-auto px-6 py-2.5 bg-orange-500 text-white rounded-xl hover:bg-orange-600 font-bold flex items-center justify-center space-x-2 shadow-sm transition-colors">
                        <i data-lucide="printer" class="w-4 h-4"></i> <span>Print Report</span>
                    </button>
                </div>
                
                <div class="overflow-x-auto print:overflow-visible">
                    <div class="bg-white p-6 md:p-10 rounded-2xl shadow-xl print:shadow-none print:p-6 border-t-[8px] md:border-t-[12px] border-slate-900 border-x border-b min-w-[700px]">
                        <div class="flex justify-between items-center border-b-[3px] border-slate-800 pb-6 mb-6">
                            <div class="w-20 h-20 md:w-28 md:h-28 flex items-center justify-center overflow-hidden bg-white">
                                <img src="${state.formLogoUrl}" alt="UVA Logo" class="w-full h-full object-contain" />
                            </div>
                            <div class="flex-1 text-center px-4">
                                <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">UDAAN VIBRANT ACADEMY</h1>
                                <p class="text-xs md:text-sm text-slate-600 italic mt-1 font-bold">"Where Learning Takes Flight"</p>
                                <div class="mt-2 md:mt-3 inline-block bg-slate-900 text-white px-4 md:px-5 py-1.5 rounded-full font-bold uppercase tracking-widest text-[10px] md:text-xs shadow-sm">Monthly Attendance Summary</div>
                            </div>
                            <div class="w-20 h-20 md:w-28 md:h-28"></div>
                        </div>
                        
                        <div class="flex justify-between items-center bg-slate-50 border-2 border-slate-200 p-4 md:p-5 rounded-xl mb-8">
                            <div>
                                <p class="text-[10px] md:text-[11px] text-slate-500 font-bold uppercase tracking-widest">Batch / Course Name</p>
                                <p class="text-lg md:text-xl font-extrabold text-orange-600 mt-1">${data.batch}</p>
                                <p class="text-[10px] md:text-xs font-bold text-slate-500 mt-1">${data.category}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] md:text-[11px] text-slate-500 font-bold uppercase tracking-widest">Report Month</p>
                                <p class="text-lg md:text-xl font-extrabold text-slate-900 mt-1">${formattedMonth}</p>
                            </div>
                        </div>
                        
                        <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-8 mb-6 px-2">
                            <div class="flex items-center space-x-2"><div class="w-4 h-4 rounded-sm bg-slate-200 border border-slate-300"></div><span class="text-xs md:text-sm font-extrabold text-slate-700">Total Students: ${data.students.length}</span></div>
                            <div class="flex items-center space-x-2"><div class="w-4 h-4 rounded-sm bg-orange-100 border border-orange-300"></div><span class="text-xs md:text-sm font-extrabold text-slate-700">Average Class Attendance: <span class="${avgAttendance < 75 ? 'text-red-600' : 'text-green-600'}">${avgAttendance}%</span></span></div>
                        </div>
                        
                        <table class="w-full text-left border-collapse border-2 border-slate-300 mb-12">
                            <thead>
                                <tr class="bg-slate-100 border-b-2 border-slate-300 text-[10px] md:text-[11px] font-extrabold text-slate-800 uppercase tracking-wider">
                                    <th class="p-2 md:p-3.5 border-r border-slate-300 text-center w-10 md:w-12">#</th>
                                    <th class="p-2 md:p-3.5 border-r border-slate-300">Student ID</th>
                                    <th class="p-2 md:p-3.5 border-r border-slate-300">Student Name</th>
                                    <th class="p-2 md:p-3.5 border-r border-slate-300 text-center">Total Classes</th>
                                    <th class="p-2 md:p-3.5 border-r border-slate-300 text-center text-green-700">Present</th>
                                    <th class="p-2 md:p-3.5 border-r border-slate-300 text-center text-red-700">Absent</th>
                                    <th class="p-2 md:p-3.5 text-center">Attendance %</th>
                                </tr>
                            </thead>
                            <tbody>${stdHTML}</tbody>
                        </table>
                        
                        <div class="flex justify-between items-end mt-12 md:mt-16 pt-8 border-t-2 border-slate-200">
                            <div class="text-center group relative cursor-pointer">
                                <label>
                                    <input type="file" accept="image/*" onchange="window.handleImageUpload(this, 'adminSignUrl')" class="hidden print:hidden" />
                                    <div class="w-32 md:w-56 border-b-2 border-slate-400 mb-2 h-12 flex items-end justify-center">
                                        ${state.adminSignUrl ? `<img src="${state.adminSignUrl}" class="max-h-12 object-contain" />` : `<span class="text-xs text-slate-300 print:hidden font-medium">Click to Sign</span>`}
                                    </div>
                                    <p class="text-[10px] md:text-sm font-bold text-slate-700 uppercase tracking-wide">Faculty Signature</p>
                                </label>
                            </div>
                            <div class="text-center group relative cursor-pointer">
                                <label>
                                    <input type="file" accept="image/*" onchange="window.handleImageUpload(this, 'adminSignUrl')" class="hidden print:hidden" />
                                    <div class="w-32 md:w-56 border-b-2 border-slate-400 mb-2 h-12 flex items-end justify-center">
                                        ${state.adminSignUrl ? `<img src="${state.adminSignUrl}" class="max-h-12 object-contain" />` : `<span class="text-xs text-slate-300 print:hidden font-medium">Click to Sign</span>`}
                                    </div>
                                    <p class="text-[10px] md:text-sm font-bold text-slate-700 uppercase tracking-wide">Center Head / Admin</p>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        // --- WHATSAPP MODAL TEMPLATE ---
        function WAModalTemplate() {
            if (!state.waModalConfig) return '';
            return `
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg border border-slate-200 overflow-hidden flex flex-col max-h-[90dvh]">
                    <div class="bg-green-500 p-4 text-white flex items-center justify-between flex-shrink-0">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="message-circle" class="w-5 h-5"></i><h3 class="font-bold text-base md:text-lg">Send WhatsApp Message</h3>
                        </div>
                        <button onclick="closeWhatsApp()" class="text-green-100 hover:text-white transition-colors p-1">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <form onsubmit="sendWhatsApp(event)" class="p-4 md:p-6 space-y-4 overflow-y-auto flex-1">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5">Recipient Number</label>
                            <div class="flex items-center border border-slate-300 rounded-xl px-3 py-2 bg-slate-50 focus-within:ring-2 focus-within:ring-green-500 focus-within:border-green-500 transition-all">
                                <span class="text-slate-500 font-bold mr-2">+91</span>
                                <input required type="text" value="${state.waModalConfig.phone}" oninput="updateWAPhone(this.value)" class="w-full bg-transparent outline-none font-medium text-slate-800 text-sm md:text-base" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5 flex justify-between">
                                <span>Message Content</span><span class="text-slate-400 font-normal">Edit before sending</span>
                            </label>
                            <textarea required rows="7" oninput="updateWAMessage(this.value)" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-sm text-slate-700 leading-relaxed transition-all resize-none shadow-inner bg-slate-50">${state.waModalConfig.message}</textarea>
                        </div>
                        <div class="flex flex-col sm:flex-row justify-end space-y-3 sm:space-y-0 sm:space-x-3 pt-2">
                            <button type="button" onclick="closeWhatsApp()" class="w-full sm:w-auto px-5 py-3 md:py-2.5 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors text-sm">Cancel</button>
                            <button type="submit" class="w-full sm:w-auto px-6 py-3 md:py-2.5 bg-green-500 text-white font-bold rounded-xl hover:bg-green-600 shadow-md transition-all flex items-center justify-center space-x-2 text-sm">
                                <span>Send via WhatsApp</span><i data-lucide="send" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>`;
        }

        initApp();

    </script>
