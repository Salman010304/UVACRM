                            <div class="flex items-center space-x-4">
                                <div class="text-right">
                                    <p class="font-extrabold text-blue-600 text-sm">${t.obtained} <span class="text-slate-400 text-xs font-medium">/ ${t.total}</span></p>
                                    <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">${Math.round((t.obtained/t.total)*100)}%</p>
                                </div>
                                <button onclick="window.deleteTestScore('${t.id}')" class="text-red-400 hover:text-red-600 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    `).join('');
                    if(!testsHTML) testsHTML = `<p class="text-slate-400 text-sm text-center py-4">No tests recorded yet.</p>`;

                    let syllabusHTML = perf.syllabus.map(s => `
                        <div class="mb-4">
                            <div class="flex justify-between text-xs font-bold mb-1.5">
                                <span class="text-slate-700">${s.subject}</span>
                                <span class="text-orange-600">${s.percent}%</span>
                            </div>
                            <input type="range" min="0" max="100" value="${s.percent}" 
                                   oninput="window.updateSyllabusPercent('${s.id}', this.value)" 
                                   onchange="window.saveSyllabusChange()" 
                                   class="w-full accent-orange-500 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                        </div>
                    `).join('');
                    if(!syllabusHTML) syllabusHTML = `<p class="text-slate-400 text-sm text-center py-4">No subjects added yet.</p>`;

                    dashboardHTML = `
                    <div class="animate-fade-in mt-6">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-bold text-slate-800 border-l-4 border-purple-500 pl-3">${student.name}'s Dashboard</h3>
                            <button onclick="window.openPerformanceReport('${student.id}')" class="bg-purple-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-purple-700 flex items-center shadow-md transition-colors">
                                <i data-lucide="file-text" class="w-4 h-4 mr-2"></i> Export PDF Report
                            </button>
                        </div>
                        
                        <!-- Stats Row -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div class="bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl p-5 text-white shadow-md flex flex-col justify-between">
                                <div class="flex justify-between items-center mb-2"><span class="text-xs font-bold uppercase tracking-widest text-blue-100">Average Score</span><i data-lucide="award" class="w-5 h-5 text-blue-200"></i></div>
                                <div class="text-3xl font-black">${avgScore}%</div>
                            </div>
                            <div class="bg-gradient-to-br from-orange-500 to-orange-700 rounded-2xl p-5 text-white shadow-md flex flex-col justify-between">
                                <div class="flex justify-between items-center mb-2"><span class="text-xs font-bold uppercase tracking-widest text-orange-100">Syllabus Complete</span><i data-lucide="book-open" class="w-5 h-5 text-orange-200"></i></div>
                                <div class="text-3xl font-black">${overallSyllabus}%</div>
                            </div>
                            <div class="bg-gradient-to-br from-purple-500 to-purple-700 rounded-2xl p-5 text-white shadow-md flex flex-col justify-between">
                                <div class="flex justify-between items-center mb-2"><span class="text-xs font-bold uppercase tracking-widest text-purple-100">Tests Taken</span><i data-lucide="file-text" class="w-5 h-5 text-purple-200"></i></div>
                                <div class="text-3xl font-black">${perf.tests.length}</div>
                            </div>
                        </div>

                        <!-- 3 Columns Details -->
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <!-- Tests -->
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col h-[400px]">
                                <div class="flex justify-between items-center mb-4 border-b pb-3">
                                    <h3 class="font-bold text-slate-800 flex items-center"><i data-lucide="check-circle" class="w-4 h-4 mr-2 text-blue-500"></i> Test Scores</h3>
                                    <button onclick="window.openAddTestModal()" class="text-xs bg-blue-50 text-blue-600 font-bold px-3 py-1.5 rounded-lg hover:bg-blue-100 transition-colors">Add Test</button>
                                </div>
                                <div class="overflow-y-auto flex-1 pr-1">${testsHTML}</div>
                            </div>

                            <!-- Syllabus -->
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col h-[400px]">
                                <div class="flex justify-between items-center mb-4 border-b pb-3">
                                    <h3 class="font-bold text-slate-800 flex items-center"><i data-lucide="book" class="w-4 h-4 mr-2 text-orange-500"></i> Syllabus Track</h3>
                                    <button onclick="window.addSyllabusSubject()" class="text-xs bg-orange-50 text-orange-600 font-bold px-3 py-1.5 rounded-lg hover:bg-orange-100 transition-colors">Add Subject</button>
                                </div>
                                <div class="overflow-y-auto flex-1 pr-1">${syllabusHTML}</div>
                            </div>

                            <!-- Remarks -->
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col h-[400px]">
                                <div class="flex justify-between items-center mb-4 border-b pb-3">
                                    <h3 class="font-bold text-slate-800 flex items-center"><i data-lucide="message-square" class="w-4 h-4 mr-2 text-purple-500"></i> Faculty Remarks</h3>
                                    <button onclick="window.savePerfRemark(); alert('Remarks Saved!')" class="text-xs bg-slate-900 text-white font-bold px-3 py-1.5 rounded-lg hover:bg-slate-800 transition-colors shadow-sm">Save Note</button>
                                </div>
                                <textarea oninput="window.updatePerfRemark(this.value)" placeholder="Enter behavioral notes, areas of improvement, parent meeting notes..." class="w-full flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl resize-none outline-none focus:ring-2 focus:ring-purple-500 text-sm text-slate-700 leading-relaxed shadow-inner">${perf.remarks}</textarea>
                            </div>
                        </div>
                    </div>`;
                }
            }
            
            if (!state.perfSelectedStudentId) {
                dashboardHTML = `
                <div class="flex items-center justify-center h-64 border-2 border-dashed border-slate-300 rounded-2xl bg-white p-4 mt-6">
                    <div class="text-center">
                        <i data-lucide="user-search" class="mx-auto text-slate-300 mb-3 w-10 h-10"></i>
                        <p class="text-slate-500 font-bold text-lg">Select a Student</p>
                        <p class="text-slate-400 text-sm mt-1">Choose a student above to view their performance tracking.</p>
                    </div>
                </div>`;
            }

            return `
            <div class="p-4 sm:p-6 md:p-8 bg-slate-50 min-h-full animate-fade-in w-full overflow-hidden">
                <div class="mb-6 md:mb-8">
                    <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">Performance Tracking</h2>
                    <p class="text-sm md:text-base text-slate-500 font-medium mt-1">Monitor test scores, syllabus completion, and faculty remarks.</p>
                </div>
                
                <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-sm font-bold text-slate-800 mb-4 border-b pb-2 uppercase tracking-wider">Select Profile</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">Program Type</label>
                            <select onchange="window.updatePerfFilter(this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700 transition-all text-sm">
                                <option value="All" ${state.perfFilterCategory==='All'?'selected':''}>All Programs</option>
                                <option value="Skill" ${state.perfFilterCategory==='Skill'?'selected':''}>Skills & AI Academy</option>
                                <option value="Tuition" ${state.perfFilterCategory==='Tuition'?'selected':''}>Academic Tuition</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">Select Batch</label>
                            <select onchange="window.updatePerfBatch(this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700 transition-all text-sm">
                                <option value="">-- Choose Batch --</option>${batchOptions}
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">Select Student</label>
                            <select onchange="window.updatePerfStudent(this.value)" class="w-full p-2.5 bg-blue-50 border border-blue-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-blue-800 transition-all shadow-sm text-sm">
                                <option value="">-- Select Student --</option>${studentOptions}
                            </select>
                        </div>
                    </div>
                </div>

                ${dashboardHTML}
                ${AddTestModalTemplate()}
            </div>`;
        }

        function AddTestModalTemplate() {
            if (!state.showAddTestModal) return '';
            return `
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm border border-slate-200 overflow-hidden flex flex-col">
                    <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                        <h3 class="font-bold text-lg text-slate-800">Add Test Score</h3>
                        <button type="button" onclick="window.closeAddTestModal()" class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <form onsubmit="window.saveTestScore(event)" class="p-5 space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">Test Date</label>
                            <input required type="date" name="date" value="${new Date().toISOString().split('T')[0]}" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium text-slate-800" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">Subject / Topic Name</label>
                            <input required type="text" name="topic" placeholder="e.g. Algebra Chapter 1" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium text-slate-800" />
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-1">Total Marks</label>
                                <input required type="number" name="total" placeholder="100" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium text-slate-800" />
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-1">Obtained</label>
                                <input required type="number" step="0.5" name="obtained" placeholder="0" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium text-slate-800" />
                            </div>
                        </div>
                        <div class="flex justify-end space-x-3 pt-4 border-t border-slate-100 mt-6">
                            <button type="button" onclick="window.closeAddTestModal()" class="px-4 py-2 text-slate-600 font-bold hover:bg-slate-100 rounded-xl text-sm transition-colors">Cancel</button>
                            <button type="submit" class="px-5 py-2 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-md text-sm transition-colors">Save Score</button>
                        </div>
                    </form>
                </div>
            </div>`;
        }

        function WAModalTemplate() {
            if (!state.waModalConfig) return '';
            return `
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg border border-slate-200 overflow-hidden flex flex-col max-h-[90dvh]">
                    <div class="bg-green-500 p-4 text-white flex items-center justify-between flex-shrink-0">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="message-circle" class="w-5 h-5"></i><h3 class="font-bold text-base md:text-lg">Send WhatsApp Message</h3>
                        </div>
                        <button onclick="window.closeWhatsApp()" class="text-green-100 hover:text-white transition-colors p-1">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <form onsubmit="window.sendWhatsApp(event)" class="p-4 md:p-6 space-y-4 overflow-y-auto flex-1">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5">Recipient Number</label>
                            <div class="flex items-center border border-slate-300 rounded-xl px-3 py-2 bg-slate-50 focus-within:ring-2 focus-within:ring-green-500 focus-within:border-green-500 transition-all">
                                <span class="text-slate-500 font-bold mr-2">+91</span>
                                <input required type="text" value="${state.waModalConfig.phone}" oninput="window.updateWAPhone(this.value)" class="w-full bg-transparent outline-none font-medium text-slate-800 text-sm md:text-base" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1.5 flex justify-between">
                                <span>Message Content</span><span class="text-slate-400 font-normal">Edit before sending</span>
                            </label>
                            <textarea required rows="7" oninput="window.updateWAMessage(this.value)" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-sm text-slate-700 leading-relaxed transition-all resize-none shadow-inner bg-slate-50">${state.waModalConfig.message}</textarea>
                        </div>
                        <div class="flex flex-col sm:flex-row justify-end space-y-3 sm:space-y-0 sm:space-x-3 pt-2">
                            <button type="button" onclick="window.closeWhatsApp()" class="w-full sm:w-auto px-5 py-3 md:py-2.5 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors text-sm">Cancel</button>
                            <button type="submit" class="w-full sm:w-auto px-6 py-3 md:py-2.5 bg-green-500 text-white font-bold rounded-xl hover:bg-green-600 shadow-md transition-all flex items-center justify-center space-x-2 text-sm">
                                <span>Send via WhatsApp</span><i data-lucide="send" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>`;
        }

    </script>
</body>
</html>
