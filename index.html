<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Udaan Vibrant Academy ERP</title>
    
    <!-- PWA Manifest & iOS Apple Touch Icon Links -->
    <link id="manifest-link" rel="manifest">
    <link id="apple-icon" rel="apple-touch-icon">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- html2pdf.js for High-Fidelity PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Google Fonts for Premium Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* --- Attractive Lines Animated Background --- */
        .bg-mesh {
            background-color: #020617;
            background-image: radial-gradient(rgba(249, 115, 22, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: floatOrb 12s ease-in-out infinite alternate;
        }
        .orb-orange { width: 400px; height: 400px; background: #ea580c; top: -100px; left: -100px; }
        .orb-purple { width: 500px; height: 500px; background: #7e22ce; bottom: -150px; right: -100px; animation-delay: -6s; }
        @keyframes floatOrb {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(60px) scale(1.15); }
        }

        /* Custom scrollbar for webkit to make tables look clean */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: white !important; width: 794px !important; min-width: 794px !important; margin: 0 auto !important; padding: 0 !important; }
            .print\:hidden { display: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:overflow-visible { overflow: visible !important; }
            .print\:bg-white { background-color: white !important; }
            /* Reset mobile margins for print */
            main { margin-bottom: 0 !important; overflow: visible !important; }
            .a4-wrapper { overflow: visible !important; padding: 0 !important; margin: 0 !important; height: auto !important; }
            .a4-document { margin: 0 !important; border: none !important; box-shadow: none !important; zoom: 1 !important; transform: none !important; height: 1122px !important; overflow: hidden !important; page-break-inside: avoid !important; }
        }

        :root {
            --doc-scale: 1;
        }

        .mobile-scale-target {
            zoom: var(--doc-scale);
        }
        /* Firefox fallback for zoom */
        @-moz-document url-prefix() {
            .mobile-scale-target {
                transform: scale(var(--doc-scale));
                transform-origin: top center;
            }
            .a4-wrapper {
                height: auto;
                overflow: hidden;
                align-items: flex-start;
            }
        }

        /* --- Premium A4 Document Styles --- */
        .a4-wrapper {
            width: 100%;
            overflow-x: auto;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }
        .a4-document {
            width: 794px !important; /* Exact A4 width at 96dpi */
            min-width: 794px !important;
            max-width: 794px !important;
            height: 1122px !important; /* Fixed to perfectly match A4 pixel ratio */
            min-height: 1122px !important; 
            max-height: 1122px !important;
            background-color: white;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            overflow: hidden;
            box-sizing: border-box;
        }
        .pdf-label {
            font-size: 0.55rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.15rem;
        }
        .pdf-value {
            font-size: 0.75rem;
            font-weight: 800;
            color: #0f172a;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 0.2rem;
            min-height: 18px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .watermark-logo {
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.04; 
            pointer-events: none;
            width: 500px; 
            height: 500px;
            object-fit: contain;
            z-index: 0;
            filter: grayscale(100%);
        }
    </style>
</head>
<body class="text-slate-800 bg-slate-50 font-sans h-[100dvh] overflow-hidden">
    
    <!-- Initial Failsafe Loader -->
    <div id="root" class="h-full">
        <div class="flex h-[100dvh] w-full items-center justify-center bg-slate-900 text-white">
            <div class="animate-pulse flex flex-col items-center">
                <div class="w-16 h-16 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="font-bold tracking-widest text-slate-400">INITIALIZING SYSTEM...</p>
                <p class="text-xs text-slate-500 mt-2">Loading core modules...</p>
            </div>
        </div>
    </div>

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // --- DATABASE & RULES ---
        const SKILL_COURSES = {
            "AI Master Combo": { duration: "1 Month" },
            "Prompt Engineering Mastery": { duration: "1 Month" },
            "AI Content Creation Mastery": { duration: "1 Month" },
            "AI Productivity & Smart Work": { duration: "1 Month" },
            "AI Career Skills Program": { duration: "1 Month+" },
            "Career Starter Pack (Comp+Eng+Excel)": { duration: "3 Months" },
            "Creative Designing Course": { duration: "2 Months" },
            "Advanced Excel Mastery": { duration: "2 Months" },
            "Accounting & Tally Prime": { duration: "2 Months" },
            "Smart Computer Skills": { duration: "2 Months" },
            "English Communication Mastery": { duration: "2 Months" },
            "Presentation Skills Mastery": { duration: "2 Months" }
        };

        const TUITION_CLASSES = [
            "STD 9", "STD 10", "STD 11 Commerce", "STD 12 Commerce"
        ];

        const LEAD_SOURCES = ["Flyer", "Instagram", "Banner", "Reference", "Walk-in", "Other"];

        const defaultAppIcon = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><rect width='200' height='200' rx='40' fill='%23ea580c'/><text x='100' y='115' font-family='Arial' font-size='70' font-weight='900' fill='%23ffffff' text-anchor='middle'>UVA</text><text x='100' y='150' font-family='Arial' font-size='18' font-weight='bold' fill='%23ffffff' text-anchor='middle' letter-spacing='3'>APP</text></svg>";
        const defaultFormLogo = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><rect width='200' height='200' rx='30' fill='%230f172a'/><text x='100' y='110' font-family='Arial' font-size='65' font-weight='900' fill='%23f97316' text-anchor='middle'>UVA</text><text x='100' y='145' font-family='Arial' font-size='16' font-weight='normal' fill='%23ffffff' text-anchor='middle' letter-spacing='2'>ACADEMY</text></svg>";

        // --- GLOBAL STATE ---
        const state = {
            isAuthLoading: true,
            user: null,
            loginError: '',
            activeTab: 'dashboard',
            appIconUrl: defaultAppIcon,
            formLogoUrl: defaultFormLogo,
            formLogoSize: 80,
            adminSignUrl: null, 
            viewingImage: null,
            inquiries: [],
            students: [],
            showNewInquiryForm: false,
            newInquiryData: { name: '', phone: '', type: 'Skill', course: '', std: '', board: '', medium: '', source: 'Flyer', inquiryDate: new Date().toISOString().split('T')[0] },
            enrollingLead: null,
            receiptData: null,
            attendanceReportData: null,
            individualReportData: null,
            performanceReportData: null,
            waModalConfig: null,
            attFilterCategory: 'All',
            attSelectedBatch: '',
            attDate: new Date().toISOString().split('T')[0],
            attReportMonth: new Date().toISOString().slice(0, 7),
            attState: {}, 
            admSearchQuery: '',
            admProgramFilter: 'All',
            admCourseFilter: 'All',
            admOfferFilter: 'All',
            canInstall: false,
            editingInquiryId: null,
            editingStudentData: null,
            performanceData: {},
            perfFilterCategory: 'All',
            perfSelectedBatch: '',
            perfSelectedStudentId: null,
            showAddTestModal: false
        };

        let unsubSnapshot = null;
        let app, auth, db;
        let syncTimeout;
        let deferredPrompt;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'uva-erp';

        // --- SAFE RENDER ENGINE ---
        function render() {
            const root = document.getElementById('root');
            if (root) root.innerHTML = AppTemplate();
            if(window.lucide) lucide.createIcons();
            
            const mainContent = document.getElementById('main-scroll-area');
            if (mainContent && !state.receiptData && !state.attendanceReportData && !state.individualReportData && !state.performanceReportData) {
                mainContent.scrollTop = 0;
            }
            
            if(window.updateScale) window.updateScale();
        }

        window.manualZoom = null;

        window.updateScale = () => {
            if(window.manualZoom !== null) {
                document.documentElement.style.setProperty('--doc-scale', window.manualZoom);
                return;
            }
            if(window.innerWidth < 820) {
                const scale = (window.innerWidth - 32) / 794;
                document.documentElement.style.setProperty('--doc-scale', scale);
            } else {
                document.documentElement.style.setProperty('--doc-scale', '1');
            }
        };
        
        window.zoomIn = () => {
            let current = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--doc-scale')) || 1;
            window.manualZoom = Math.min(current + 0.15, 2.5);
            window.updateScale();
        };

        window.zoomOut = () => {
            let current = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--doc-scale')) || 1;
            window.manualZoom = Math.max(current - 0.15, 0.3);
            window.updateScale();
        };

        window.resetZoom = () => {
            window.manualZoom = null;
            window.updateScale();
        };

        window.addEventListener('resize', window.updateScale);
        window.addEventListener('beforeprint', () => document.documentElement.style.setProperty('--doc-scale', '1'));
        window.addEventListener('afterprint', () => window.updateScale());

        // --- ID GENERATION & MIGRATION ENGINE ---
        window.getAcademicYear = (dateStr) => {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = date.getMonth();
            let startYear, endYear;
            if (month >= 3) { startYear = year; endYear = year + 1; } 
            else { startYear = year - 1; endYear = year; }
            return `${startYear.toString().slice(-2)}-${endYear.toString().slice(-2)}`;
        };

        window.migrateAndGetNextId = (dateStr) => {
            let changed = false;
            const idMap = {};
            const yearCounts = {};

            state.students.forEach(s => {
                const match = s.id.match(/^UVA\/(\d{2}-\d{2})\/(\d{4})$/);
                if (match) {
                    const yearKey = match[1];
                    const serial = parseInt(match[2], 10);
                    if (!yearCounts[yearKey] || serial > yearCounts[yearKey]) {
                        yearCounts[yearKey] = serial;
                    }
                }
            });

            const sortedStudents = [...state.students].sort((a, b) => new Date(a.date) - new Date(b.date));
            sortedStudents.forEach(s => {
                if (!/^UVA\/\d{2}-\d{2}\/\d{4}$/.test(s.id)) {
                    const acYear = window.getAcademicYear(s.date);
                    if (!yearCounts[acYear]) yearCounts[acYear] = 0;
                    yearCounts[acYear]++;
                    const newId = `UVA/${acYear}/${yearCounts[acYear].toString().padStart(4, '0')}`;
                    idMap[s.id] = newId;
                    s.id = newId;
                    changed = true;
                }
            });

            if (changed) {
                const newAttState = {};
                for (const date in state.attState) {
                    newAttState[date] = {};
                    for (const key in state.attState[date]) {
                        let newKey = key;
                        for (const oldId in idMap) {
                            if (key === oldId) newKey = idMap[oldId];
                            else if (key.startsWith(oldId + '_')) newKey = key.replace(oldId + '_', idMap[oldId] + '_');
                        }
                        newAttState[date][newKey] = state.attState[date][key];
                    }
                }
                state.attState = newAttState;

                const newPerfData = {};
                for (const oldId in state.performanceData) {
                    const newId = idMap[oldId] || oldId;
                    newPerfData[newId] = state.performanceData[oldId];
                }
                state.performanceData = newPerfData;
            }

            const targetYear = window.getAcademicYear(dateStr || new Date().toISOString().split('T')[0]);
            if (!yearCounts[targetYear]) yearCounts[targetYear] = 0;
            const nextSerial = yearCounts[targetYear] + 1;
            return { nextId: `UVA/${targetYear}/${nextSerial.toString().padStart(4, '0')}`, changed };
        };

        render();

        setTimeout(() => {
            if (state.isAuthLoading) {
                state.isAuthLoading = false;
                state.loginError = "Network connection delayed. Please check your internet or use 'Bypass Login'.";
                render();
            }
        }, 4000);

        // --- BULLETPROOF FIREBASE INITIALIZATION ---
        try {
            let config = {
                apiKey: "AIzaSyDvwI0ImHdQhfyC1kchvg5APLdrvan6L54",
                authDomain: "uvacrm-b417f.firebaseapp.com",
                projectId: "uvacrm-b417f",
                storageBucket: "uvacrm-b417f.firebasestorage.app",
                messagingSenderId: "292694368608",
                appId: "1:292694368608:web:73248adec8a8150764fe05",
                measurementId: "G-C24RR5VWYV"
            };
            
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                try { config = JSON.parse(__firebase_config); } catch(e) {}
            }

            app = firebase.initializeApp(config);
            auth = firebase.auth();
            db = firebase.firestore();

            auth.onAuthStateChanged(user => {
                state.isAuthLoading = false;
                state.user = user;
                if (user && user.uid !== 'bypassed_user') {
                    setupRealtimeSync(user.uid);
                } else if(user && user.uid === 'bypassed_user') {
                     window.loadDataFromCloud('bypassed_user');
                } else {
                    if (unsubSnapshot) { unsubSnapshot(); unsubSnapshot = null; }
                    render();
                }
            });

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                auth.signInWithCustomToken(__initial_auth_token).catch(e => {
                    console.error("Auth Token Error:", e);
                    state.isAuthLoading = false; render();
                });
            }

        } catch (err) {
            console.error("Firebase Critical Error:", err);
            state.isAuthLoading = false;
            state.loginError = "Firebase connection blocked by browser. Please use 'Bypass Login (Test Mode)'.";
            render();
        }

        // --- REAL-TIME SYNC ---
        function setupRealtimeSync(uid) {
             if (!db) return;
             const docRef = db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('data').doc('erp_state');
             if (unsubSnapshot) unsubSnapshot(); 
             
             unsubSnapshot = docRef.onSnapshot((docSnap) => {
                 if (docSnap.exists) {
                     const data = docSnap.data();
                     state.appIconUrl = data.appIconUrl || defaultAppIcon;
                     state.formLogoUrl = data.formLogoUrl || defaultFormLogo;
                     state.formLogoSize = data.formLogoSize || 80;
                     state.adminSignUrl = data.adminSignUrl || null;
                     state.inquiries = data.inquiries || [];
                     state.students = data.students || [];
                     
                     if (data.attState && Object.keys(data.attState).length > 0 && !Object.keys(data.attState)[0].includes('-')) {
                         state.attState = {};
                         state.attState[new Date().toISOString().split('T')[0]] = data.attState;
                     } else {
                         state.attState = data.attState || {};
                     }
                     state.performanceData = data.performanceData || {};

                     // Run smart ID migration seamlessly
                     const migrationResult = window.migrateAndGetNextId(new Date().toISOString().split('T')[0]);
                     if (migrationResult.changed) window.saveDataToCloud();
                 }
                 render();
             }, (error) => {
                 console.error("Real-time sync error:", error);
             });
        }

        window.saveDataToCloud = async () => {
            const dataToSave = {
                appIconUrl: state.appIconUrl,
                formLogoUrl: state.formLogoUrl,
                formLogoSize: state.formLogoSize || 80,
                adminSignUrl: state.adminSignUrl || null,
                inquiries: state.inquiries,
                students: state.students,
                attState: state.attState,
                performanceData: state.performanceData
            };

            if (state.user && state.user.uid === 'bypassed_user') {
                localStorage.setItem('uva_erp_data', JSON.stringify(dataToSave));
                return;
            }

            if (!state.user || !db) return;
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                try {
                    const docRef = db.collection('artifacts').doc(appId).collection('users').doc(state.user.uid).collection('data').doc('erp_state');
                    await docRef.set(dataToSave, { merge: true });
                } catch (e) { console.error("Cloud Sync Failed", e); }
            }, 500);
        };

        window.loadDataFromCloud = async (uid) => {
            try {
                if (uid === 'bypassed_user') {
                    const stored = localStorage.getItem('uva_erp_data');
                    if (stored) {
                        const data = JSON.parse(stored);
                        if (data.attState && Object.keys(data.attState).length > 0 && !Object.keys(data.attState)[0].includes('-')) {
                             const migratedAtt = {};
                             migratedAtt[new Date().toISOString().split('T')[0]] = data.attState;
                             data.attState = migratedAtt;
                        }
                        Object.assign(state, data);
                        state.performanceData = data.performanceData || {};

                        // Run smart ID migration seamlessly
                        const migrationResult = window.migrateAndGetNextId(new Date().toISOString().split('T')[0]);
                        if (migrationResult.changed) window.saveDataToCloud();
                    }
                    render();
                }
            } catch (e) {
                console.error("Failed to load offline data", e);
                render();
            }
        };

        // --- AUTH ACTIONS ---
        window.handleLogin = (e) => {
            e.preventDefault();
            if(!auth) return alert("System running in offline mode. Please use Bypass Login.");
            
            const fd = new FormData(e.target);
            const email = fd.get('email');
            const password = fd.get('password');
            state.loginError = '';
            state.isAuthLoading = true; 
            render(); 

            auth.signInWithEmailAndPassword(email, password).catch(error => {
                state.isAuthLoading = false;
                state.loginError = error.message;
                render();
            });
        };

        window.bypassLogin = () => {
            state.user = { email: 'admin@uva.com (Bypassed)', uid: 'bypassed_user' };
            window.loadDataFromCloud('bypassed_user');
        };

        window.handleLogout = () => {
            if(state.user && state.user.uid === 'bypassed_user') {
                state.user = null;
                render();
            } else if (auth) {
                auth.signOut();
            }
        };

        // --- GLOBAL ACTIONS ---
        window.switchTab = (tab) => {
            state.activeTab = tab;
            state.receiptData = null;
            state.attendanceReportData = null;
            state.individualReportData = null;
            state.performanceReportData = null;
            render();
        };

        window.openWhatsApp = (phone, type, name, courseName) => {
            let message = "";
            if (type === 'welcome_inquiry') {
                message = `Hello ${name},\n\nWelcome to *Udaan Vibrant Academy (UVA)*! 🚀\nThank you for your inquiry regarding our ${courseName} course. Where learning takes flight!\n\nLet us know when you'd like to schedule a visit.`;
            } else if (type === 'followup_inquiry') {
                message = `Hello ${name},\n\nWe noticed your interest in the *${courseName}* at Udaan Vibrant Academy! 🌟\n\nSeats are filling up fast for our upcoming batch. Do you have any questions?\n\nLet's build your future together! 🚀`;
            } else if (type === 'absent_alert') {
                message = `Dear Parent/Student,\n\nNotice from UVA: ${name} was marked ABSENT today for the ${courseName} batch. Regular attendance is crucial for success!\n\nRegards,\nUdaan Vibrant Academy`;
            } else if (type === 'admission_form') {
                message = `Dear ${name} / Parent,\n\nWelcome to *Udaan Vibrant Academy (UVA)*! 🎉\n\nYour admission for the ${courseName} program is successfully confirmed.\n\nPlease find your detailed Admission Form PDF attached to this message (downloaded to your device).\n\nLet's build your future together! 🚀`;
            }
            state.waModalConfig = { phone, message };
            render();
        };

        window.closeWhatsApp = () => { state.waModalConfig = null; render(); };
        window.updateWAMessage = (val) => { state.waModalConfig.message = val; };
        window.updateWAPhone = (val) => { state.waModalConfig.phone = val; };
        
        window.sendWhatsApp = (e) => {
            e.preventDefault();
            if (!state.waModalConfig) return;
            const encodedMessage = encodeURIComponent(state.waModalConfig.message);
            const whatsappUrl = `https://wa.me/91${state.waModalConfig.phone}?text=${encodedMessage}`;
            window.open(whatsappUrl, '_blank');
            window.closeWhatsApp();
        };

        window.shareFormWhatsApp = () => {
            window.generatePremiumPDF();
            setTimeout(() => {
                const courseName = state.receiptData.type === 'Skill' ? state.receiptData.course : state.receiptData.std;
                window.openWhatsApp(state.receiptData.phone, 'admission_form', state.receiptData.name, courseName);
            }, 1000);
        };

        // --- INQUIRY ACTIONS ---
        window.toggleInquiryForm = () => {
            state.showNewInquiryForm = !state.showNewInquiryForm;
            if (!state.showNewInquiryForm) {
                state.editingInquiryId = null;
                state.newInquiryData = { name: '', phone: '', type: 'Skill', course: '', std: '', board: '', medium: '', source: 'Flyer', inquiryDate: new Date().toISOString().split('T')[0] };
            }
            render();
        };

        window.updateNewInquiryData = (key, val) => {
            state.newInquiryData[key] = val;
            if(key === 'type') render(); 
        };

        window.saveInquiry = (e) => {
            e.preventDefault();
            if (state.editingInquiryId) {
                const index = state.inquiries.findIndex(i => i.id === state.editingInquiryId);
                if (index !== -1) {
                    state.inquiries[index] = { ...state.inquiries[index], ...state.newInquiryData, date: state.newInquiryData.inquiryDate };
                }
                state.editingInquiryId = null;
            } else {
                state.inquiries.push({
                    ...state.newInquiryData,
                    id: `INQ-${Math.floor(Math.random() * 1000)}`,
                    status: 'New',
                    date: state.newInquiryData.inquiryDate || new Date().toISOString().split('T')[0]
                });

            state.showNewInquiryForm = false;

                reader.onload = (e) => { 
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_WIDTH = 1000;
                        const MAX_HEIGHT = 1000;
                        
                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }
                        
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

                        if (studentId) {
                            const std = state.students.find(s => s.id === studentId);
                            if (std) std[type] = compressedBase64;
                        } else {
                            state[type] = compressedBase64;

                        }
                        await window.saveDataToCloud();
                        render(); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);

        function getBatches() {
            const b = new Set();
            state.students.forEach(s => {

                const isTuition = s.type === 'Tuition' || s.type === 'Both';
                if (isSkill && (state.attFilterCategory === 'All' || state.attFilterCategory === 'Skill')) {
                    if(s.course) b.add(s.course);
                }
                if (isTuition && (state.attFilterCategory === 'All' || state.attFilterCategory === 'Tuition')) {
                    if(s.std) b.add(`${s.std} ${s.board} ${s.medium}`);
                }
            });
            return [...b];
        }

        function getFilteredStudents() {
            if (!state.attSelectedBatch) return [];
            return state.students.filter(s => {
                const skillBatch = s.course;
                const tuitionBatch = `${s.std} ${s.board} ${s.medium}`;
                const matchSkill = (s.type === 'Skill' || s.type === 'Both') && skillBatch === state.attSelectedBatch && (state.attFilterCategory === 'All' || state.attFilterCategory === 'Skill');
                const matchTuition = (s.type === 'Tuition' || s.type === 'Both') && tuitionBatch === state.attSelectedBatch && (state.attFilterCategory === 'All' || state.attFilterCategory === 'Tuition');
                return matchSkill || matchTuition;
            });
        }

        window.generatePremiumPDF = () => {

            btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 mr-2 animate-spin"></i> Generating PDF...`;
            if(window.lucide) lucide.createIcons();

            document.documentElement.style.setProperty('--doc-scale', '1');
            const element = document.getElementById('premium-admission-document');
            window.scrollTo(0, 0);

            let pdfName = `UVA_Document.pdf`;
            if (state.receiptData) pdfName = `UVA_Admission_${state.receiptData.id}.pdf`;
            else if (state.attendanceReportData) pdfName = `UVA_Batch_Report_${state.attendanceReportData.month}.pdf`;
            else if (state.individualReportData) pdfName = `UVA_Student_Report_${state.individualReportData.student.id}.pdf`;
            else if (state.performanceReportData) pdfName = `UVA_Performance_${state.performanceReportData.student.id}.pdf`;

            const opt = {
                margin:       0,
                filename:     pdfName,
                image:        { type: 'jpeg', quality: 1.0 },
                pagebreak:    { mode: ['css', 'legacy'] },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true, 
                    scrollY: 0, 
                    scrollX: 0, 
                    onclone: (clonedDoc) => {
                        const el = clonedDoc.getElementById('premium-admission-document');
                        if (el) {
                            el.style.zoom = '1';
                            el.style.transform = 'none';
                            el.style.width = '794px';
                            el.style.position = 'absolute'; 
                            el.style.top = '0';
                            el.style.left = '0';
                            el.style.margin = '0';
                            el.style.gap = '0';
                            
                            const pages = el.querySelectorAll('.a4-document');
                            pages.forEach(p => {
                                p.style.margin = '0';
                                p.style.marginBottom = '0';
                                p.style.boxShadow = 'none';
                                p.style.height = '1122px';
                            });
                        }
                    }
                },
                jsPDF:        { unit: 'px', format: [794, 1122], orientation: 'portrait', hotfixes: ["px_scaling"] }
            };

            setTimeout(() => {
                html2pdf().set(opt).from(element).save().then(() => {
                    btn.innerHTML = originalText;
                    if(window.lucide) lucide.createIcons();
                    window.updateScale();
                });
            }, 300);

            const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
            const link = document.getElementById('manifest-link');
            if(link) link.href = URL.createObjectURL(manifestBlob);

            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request).catch(() => new Response('Offline Mode Active.'))); });
            `;
            const swBlob = new Blob([swCode], {type: 'text/javascript'});

            const totalInquiries = state.inquiries.length;
            const conversionRate = totalInquiries > 0 ? Math.round((enrolledCount / totalInquiries) * 100) : 0;

            let sourceHTML = Object.entries(sourceCounts).sort((a,b)=>b[1]-a[1]).map(([source, count]) => `

                                <label class="block text-sm font-bold text-slate-600 mb-1.5">Lead Source</label>
                                <select onchange="window.updateNewInquiryData('source', this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none transition-all text-sm">
                                    ${LEAD_SOURCES.map(s => `<option value="${s}" ${d.source===s?'selected':''}>${s}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <div class="p-4 md:p-5 bg-slate-50 border border-slate-200 rounded-xl">
                            <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-6 mb-5">
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="radio" name="progType" onchange="window.updateNewInquiryData('type', 'Skill')" ${d.type==='Skill'?'checked':''} class="w-4 h-4 text-orange-500 focus:ring-orange-500 border-slate-300" />
                                    <span class="font-bold text-slate-700 text-sm">Skills & AI Academy</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="radio" name="progType" onchange="window.updateNewInquiryData('type', 'Tuition')" ${d.type==='Tuition'?'checked':''} class="w-4 h-4 text-orange-500 focus:ring-orange-500 border-slate-300" />
                                    <span class="font-bold text-slate-700 text-sm">Academic Tuition</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="radio" name="progType" onchange="window.updateNewInquiryData('type', 'Both')" ${d.type==='Both'?'checked':''} class="w-4 h-4 text-orange-500 focus:ring-orange-500 border-slate-300" />
                                    <span class="font-bold text-slate-700 text-sm">Both (Combo)</span>
                                </label>
                            </div>
                            ${dynamicFields}
                        </div>

                        <div class="flex flex-col sm:flex-row justify-end space-y-3 sm:space-y-0 sm:space-x-4 pt-2">
                            <button type="button" onclick="window.toggleInquiryForm()" class="w-full sm:w-auto px-5 py-3 sm:py-2.5 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors text-sm">Cancel</button>
                            <button type="submit" class="w-full sm:w-auto px-6 py-3 sm:py-2.5 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-colors shadow-md text-sm">${submitBtn}</button>
                        </div>
                    </form>
                </div>`;
            }

            let tableHTML = state.inquiries.map(inq => {
                const badgeClass = inq.type === 'Both' ? 'bg-indigo-100 text-indigo-700' : (inq.type === 'Skill' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700');
                const statusClass = inq.status === 'Enrolled' ? 'bg-green-50 text-green-700 border-green-200' :
                                    inq.status === 'New' ? 'bg-blue-50 text-blue-700 border-blue-200' :
                                    inq.status === 'Closed' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-orange-50 text-orange-700 border-orange-200';
                
                const interestStr = inq.type === 'Both' ? `${inq.course} + ${inq.std}` : (inq.type === 'Skill' ? inq.course : `${inq.std} | ${inq.board} | ${inq.medium}`);
                
                let actionsHTML = `
                    <button title="Send WhatsApp Welcome" onclick="window.openWhatsApp('${inq.phone}', 'welcome_inquiry', '${inq.name}', '${interestStr}')" class="p-2 text-green-600 hover:bg-green-100 rounded-lg transition-colors">
                        <i data-lucide="message-circle" class="w-5 h-5 md:w-4 md:h-4"></i>
                    </button>
                `;
                
                if (inq.status !== 'Enrolled' && inq.status !== 'Closed') {
                    actionsHTML += `
                        <button title="Send WhatsApp Follow-up" onclick="window.openWhatsApp('${inq.phone}', 'followup_inquiry', '${inq.name}', '${interestStr}')" class="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors">
                            <i data-lucide="message-circle" class="w-5 h-5 md:w-4 md:h-4"></i>
                        </button>
                        <button onclick="window.openEnrollModal('${inq.id}')" class="ml-2 px-3 py-1.5 md:px-4 md:py-1.5 bg-slate-900 text-white text-xs md:text-sm font-bold rounded-lg hover:bg-slate-800 shadow-sm transition-colors whitespace-nowrap">
                            Enroll Now
                        </button>
                    `;
                } else if (inq.status === 'Enrolled') {
                    actionsHTML += `
                        <span class="ml-2 flex items-center text-green-600 font-bold text-xs md:text-sm bg-green-50 px-2 md:px-3 py-1.5 rounded-lg border border-green-200 inline-flex whitespace-nowrap">
                            <i data-lucide="check-circle" class="w-4 h-4 mr-1"></i> Enrolled
                        </span>
                    `;
                }

                actionsHTML += `
                    <button onclick="window.editInquiry('${inq.id}')" title="Edit Inquiry" class="ml-2 p-2 text-slate-500 hover:bg-slate-100 hover:text-blue-600 rounded-lg transition-colors">
                        <i data-lucide="pencil" class="w-5 h-5 md:w-4 md:h-4"></i>
                    </button>
                    <button onclick="window.deleteInquiry('${inq.id}')" title="Delete Inquiry" class="p-2 text-slate-500 hover:bg-slate-100 hover:text-red-600 rounded-lg transition-colors">

                `;

                return `
                <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0">
                    <td class="p-3 sm:p-4 align-top whitespace-nowrap">
                        <p class="font-bold text-slate-800 text-sm">${inq.name}</p>
                        <p class="text-xs text-slate-500 font-medium mt-0.5">${inq.phone}</p>
                        <p class="text-[10px] text-slate-400 mt-1 font-medium bg-slate-100 inline-block px-2 py-0.5 rounded border border-slate-200">Inq: ${new Date(inq.date).toLocaleDateString('en-IN')}</p>
                    </td>
                    <td class="p-3 sm:p-4 align-top whitespace-nowrap max-w-[150px] sm:max-w-[200px] md:max-w-none truncate">
                        <span class="inline-block px-2 py-0.5 rounded text-[10px] uppercase tracking-widest font-bold mb-1 ${badgeClass}">${inq.type}</span>
                        <p class="text-xs sm:text-sm font-bold text-slate-700 truncate" title="${interestStr}">${interestStr}</p>
                    </td>
                    <td class="p-3 sm:p-4 text-xs sm:text-sm font-medium text-slate-600 align-top whitespace-nowrap">${inq.source}</td>
                    <td class="p-3 sm:p-4 align-top whitespace-nowrap">
                        <select onchange="window.updateInquiryStatus('${inq.id}', this.value)" class="text-xs md:text-sm border rounded-lg p-1.5 md:p-2 font-bold outline-none cursor-pointer w-full md:w-auto ${statusClass}">
                            <option value="New" ${inq.status==='New'?'selected':''}>New</option>
                            <option value="Demo" ${inq.status==='Demo'?'selected':''}>Demo Attended</option>
                            <option value="Follow-Up" ${inq.status==='Follow-Up'?'selected':''}>Follow-Up</option>
                            <option value="Enrolled" ${inq.status==='Enrolled'?'selected':''} disabled>Enrolled</option>
                            <option value="Closed" ${inq.status==='Closed'?'selected':''}>Closed</option>
                        </select>
                    </td>
                    <td class="p-3 sm:p-4 text-right flex justify-end items-center space-x-0.5 md:space-x-1 align-top whitespace-nowrap">${actionsHTML}</td>
                </tr>`;
            }).join('');
            if(!tableHTML) tableHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-500 font-medium text-sm">No inquiries found.</td></tr>`;

            return `
            <div class="p-4 sm:p-6 md:p-8 relative min-h-full animate-fade-in w-full overflow-hidden">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 md:mb-8 gap-4">
                    <div>
                        <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">Inquiries & CRM</h2>
                        <p class="text-sm md:text-base text-slate-500 font-medium mt-1">Manage leads, track status, and enroll students.</p>
                    </div>
                    <button onclick="window.toggleInquiryForm()" class="w-full sm:w-auto bg-orange-500 text-white px-5 py-3 sm:py-2.5 rounded-xl flex items-center justify-center space-x-2 hover:bg-orange-600 font-bold shadow-md transition-colors">
                        <i data-lucide="plus" class="w-5 h-5"></i> <span>New Inquiry</span>
                    </button>
                </div>
                ${formHTML}
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto w-full">
                    <table class="w-full min-w-[700px] text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-[10px] sm:text-xs uppercase tracking-wider text-slate-500 font-bold">
                                <th class="p-3 sm:p-4">Name & Contact</th><th class="p-3 sm:p-4">Interest (Course/Class)</th><th class="p-3 sm:p-4">Source</th><th class="p-3 sm:p-4">Status</th><th class="p-3 sm:p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody>${tableHTML}</tbody>
                    </table>
                </div>
                ${EnrollModalTemplate()}
            </div>`;
        }

        function EnrollModalTemplate() {
            if (!state.enrollingLead) return '';
            const l = state.enrollingLead;
            const programName = l.type === 'Both' ? `${l.course} & ${l.std} ${l.board}` : (l.type === 'Skill' ? l.course : `${l.std} ${l.board}`);
            
            let batchInputs = '';
            if (l.type === 'Both') {
                batchInputs = `
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Skill Batch Timing</label><input type="text" name="batchTimingSkill" placeholder="e.g. 4 PM - 6 PM" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Tuition Batch Timing</label><input type="text" name="batchTimingTuition" placeholder="e.g. 6 PM - 8 PM" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                `;
            } else {
                batchInputs = `<div class="sm:col-span-2"><label class="block text-xs font-bold text-slate-600 mb-1">Preferred Batch</label><input type="text" name="batchTiming" placeholder="e.g. 4 PM - 6 PM" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>`;
            }

            return `
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-3 sm:p-4 animate-fade-in">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[85vh] md:max-h-[90vh] overflow-y-auto border border-slate-200">
                    <div class="p-4 md:p-6 border-b border-slate-200 flex justify-between items-center bg-slate-50 sticky top-0 z-10">
                        <div>
                            <h3 class="text-lg md:text-xl font-extrabold text-slate-800">Complete Admission Details</h3>
                            <p class="text-xs md:text-sm text-slate-500 mt-1 font-medium">Enrolling <span class="font-bold text-orange-600">${l.name}</span> into <br class="md:hidden"/>${programName}</p>
                        </div>
                        <button type="button" onclick="window.closeEnrollModal()" class="p-2 text-slate-400 hover:bg-slate-200 hover:text-slate-700 rounded-full transition-colors">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <form onsubmit="window.confirmEnroll(event)" class="p-4 md:p-8 space-y-6 md:space-y-8">
                        <datalist id="offer-list">
                            <option value="None"></option>
                            <option value="Free Soft Skills Classes"></option>
                            <option value="Free Computer Training"></option>
                            <option value="Free Spoken English"></option>
                            <option value="10% Combo Discount"></option>
                        </datalist>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                            <!-- Student Details -->
                            <div class="space-y-4 md:space-y-5">
                                <h4 class="font-bold text-slate-800 border-b-2 border-slate-100 pb-2 flex items-center text-sm md:text-base"><i data-lucide="user-plus" class="w-4 h-4 mr-2 text-orange-500"></i> Student Information</h4>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-5">
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Joining Date</label><input required type="date" name="joiningDate" value="${new Date().toISOString().split('T')[0]}" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-sm font-medium text-slate-700" /></div>
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Date of Birth</label><input type="date" name="dob" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-sm font-medium text-slate-700" /></div>
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Gender</label>
                                        <select name="gender" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700">
                                            <option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option>
                                        </select>
                                    </div>
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Blood Group</label>
                                        <select name="bloodGroup" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700">
                                            <option value="">Select</option><option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="O+">O+</option><option value="O-">O-</option><option value="AB+">AB+</option><option value="AB-">AB-</option>
                                        </select>
                                    </div>
                                    ${batchInputs}
                                    <div class="sm:col-span-2"><label class="block text-xs font-bold text-slate-600 mb-1">Free Add-on Course (Offer)</label><input type="text" list="offer-list" name="freeOffer" placeholder="Type or select an offer..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                </div>
                                <div><label class="block text-xs font-bold text-slate-600 mb-1">Residential Address</label><textarea rows="2" name="address" placeholder="Flat/House No, Area, Street" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700"></textarea></div>
                                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-5 mt-2">
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">City / District</label><input type="text" name="city" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">State</label><input type="text" name="state" value="Gujarat" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Pin Code</label><input type="text" name="pincode" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                </div>
                            </div>
                            <!-- Parent Details -->
                            <div class="space-y-4 md:space-y-5">
                                <h4 class="font-bold text-slate-800 border-b-2 border-slate-100 pb-2 flex items-center text-sm md:text-base"><i data-lucide="users" class="w-4 h-4 mr-2 text-orange-500"></i> Parent / Guardian Info</h4>
                                <div><label class="block text-xs font-bold text-slate-600 mb-1">Parent's Full Name</label><input type="text" name="parentName" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-5">
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Parent's Phone</label><input type="text" name="parentPhone" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                    <div><label class="block text-xs font-bold text-slate-600 mb-1">Occupation</label><input type="text" name="parentOccupation" placeholder="e.g. Business / Service" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                                </div>
                                <div><label class="block text-xs font-bold text-slate-600 mb-1">Parent's Email</label><input type="email" name="parentEmail" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-sm font-medium text-slate-700" /></div>
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row justify-end space-y-3 sm:space-y-0 sm:space-x-4 pt-4 border-t border-slate-100">
                            <button type="button" onclick="window.closeEnrollModal()" class="w-full sm:w-auto px-6 py-3 md:py-2.5 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors text-sm">Cancel</button>
                            <button type="submit" class="w-full sm:w-auto px-8 py-3 md:py-2.5 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 shadow-xl shadow-slate-900/20 transition-all flex items-center justify-center text-sm">
                                <i data-lucide="check-circle" class="w-4 h-4 mr-2"></i> Confirm Admission
                            </button>
                        </div>
                    </form>
                </div>
            </div>`;
        }

        function AdmissionsTemplate() {
            const courseSet = new Set();
            state.students.forEach(s => {
                if (state.admProgramFilter === 'All' || state.admProgramFilter === 'Skill' || s.type === 'Both') {
                    if(s.course && (s.type === 'Skill' || s.type === 'Both')) courseSet.add(s.course);
                }
                if (state.admProgramFilter === 'All' || state.admProgramFilter === 'Tuition' || s.type === 'Both') {
                    if(s.std && (s.type === 'Tuition' || s.type === 'Both')) courseSet.add(`${s.std} ${s.board} ${s.medium}`);
                }
            });
            const activeCourses = [...courseSet];

            let filteredStudents = state.students.filter(std => {
                const matchesSearch = std.name.toLowerCase().includes(state.admSearchQuery.toLowerCase()) || std.id.toLowerCase().includes(state.admSearchQuery.toLowerCase());
                const matchesProgram = state.admProgramFilter === 'All' || std.type === state.admProgramFilter || std.type === 'Both';
                
                const stdCourseSkill = std.course;
                const stdCourseTuition = `${std.std} ${std.board} ${std.medium}`;
                
                const matchesCourse = state.admCourseFilter === 'All' || 
                    ((std.type === 'Skill' || std.type === 'Both') && stdCourseSkill === state.admCourseFilter) ||
                    ((std.type === 'Tuition' || std.type === 'Both') && stdCourseTuition === state.admCourseFilter);
                
                const hasOffer = std.freeOffer && std.freeOffer !== 'None';
                const matchesOffer = state.admOfferFilter === 'All' || 
                                    (state.admOfferFilter === 'With Offer' ? hasOffer : !hasOffer);

                return matchesSearch && matchesProgram && matchesCourse && matchesOffer;
            });

            let stdHTML = filteredStudents.map(std => {
                const courseName = std.type === 'Both' ? `${std.course} & ${std.std} ${std.board}` : (std.type === 'Skill' ? std.course : `${std.std} | ${std.board} (${std.medium} Med.)`);
                const offerBadge = (std.freeOffer && std.freeOffer !== 'None') ? `<p class="text-[10px] md:text-xs text-orange-600 font-bold mt-1.5 bg-orange-50 inline-block px-2.5 py-0.5 rounded border border-orange-200">Offer Applied: ${std.freeOffer}</p>` : '';
                return `
                <div class="bg-white p-4 md:p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between md:items-center gap-4 md:gap-6 hover:shadow-md transition-shadow">
                    <div class="flex-1">
                        <div class="flex items-center space-x-3 mb-1.5">
                            <h3 class="text-lg md:text-xl font-extrabold text-slate-800">${std.name}</h3>
                            <span class="text-[10px] md:text-xs font-bold font-mono bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md border border-slate-200">${std.id}</span>
                        </div>
                        <p class="text-xs md:text-sm text-slate-600 font-bold mb-1 leading-snug">${courseName}</p>
                        <p class="text-[10px] md:text-xs text-slate-400 font-medium">Phone: +91 ${std.phone} • Enrolled: ${std.date}</p>
                        ${offerBadge}
                    </div>
                    <div class="flex space-x-2 md:space-x-3 pt-3 md:pt-0 border-t border-slate-100 md:border-0 mt-3 md:mt-0 w-full md:w-auto overflow-x-auto">
                        <button onclick="window.openEditStudentModal('${std.id}')" title="Edit Student" class="flex-shrink-0 px-4 py-3 md:py-2.5 bg-slate-100 text-slate-600 rounded-xl text-sm font-bold hover:bg-slate-200 hover:text-slate-800 flex items-center justify-center space-x-1 transition-all">
                            <i data-lucide="pencil" class="w-4 h-4 md:w-5 md:h-5"></i><span class="md:hidden lg:inline text-xs">Edit</span>
                        </button>
                        <button onclick="window.deleteStudent('${std.id}')" title="Delete Student" class="flex-shrink-0 px-4 py-3 md:py-2.5 bg-red-50 text-red-500 rounded-xl text-sm font-bold hover:bg-red-100 hover:text-red-600 flex items-center justify-center space-x-1 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4 md:w-5 md:h-5"></i><span class="md:hidden lg:inline text-xs">Delete</span>
                        </button>
                        <button onclick="window.openReceipt('${std.id}')" class="flex-shrink-0 px-5 py-3 md:py-2.5 bg-orange-500 text-white rounded-xl text-sm font-bold hover:bg-orange-600 flex items-center justify-center space-x-2 shadow-md shadow-orange-500/20 transition-all">
                            <i data-lucide="file-text" class="w-4 h-4 md:w-5 md:h-5"></i> <span>Form</span>
                        </button>
                    </div>
                </div>`;
            }).join('');

            if(filteredStudents.length === 0) stdHTML = `<div class="p-8 md:p-10 text-center text-slate-500 font-medium bg-white rounded-2xl border border-dashed border-slate-300 text-sm md:text-base">No students found matching your filters.</div>`;

            return `
            <div class="p-4 sm:p-6 md:p-8 min-h-full animate-fade-in w-full overflow-hidden">
                <div class="mb-6 md:mb-8">

        // --- ATTENDANCE TEMPLATE ---
        function AttendanceTemplate() {
            const batches = getBatches();
            const filteredStudents = getFilteredStudents();

            let batchOptions = batches.map(b => `<option value="${b}" ${state.attSelectedBatch===b?'selected':''}>${b}</option>`).join('');
            
            let displayHTML = '';
            if (state.attSelectedBatch) {
                const dateData = state.attState[state.attDate] || {};
                let presentCount = 0;
                let absentCount = 0;

                let stdRows = filteredStudents.map(std => {
                    const attKey = `${std.id}_${state.attSelectedBatch}`;
                    const currentStatus = dateData[attKey]?.status || dateData[std.id]?.status || null; // Unmarked default
                    const currentReason = dateData[attKey]?.reason || dateData[std.id]?.reason || '';
                    
                    if (currentStatus === 'Present') presentCount++;
                    if (currentStatus === 'Absent') absentCount++;
                    
                    let reasonHTML = '';
                    if (currentStatus === 'Absent') {
                        reasonHTML = `
                        <div class="w-full sm:w-56 transition-all mt-2 sm:mt-0">
                            <select onchange="window.updateAttReason('${std.id}', this.value)" class="w-full text-sm border-slate-300 rounded-xl p-2.5 sm:p-3 bg-white text-slate-700 shadow-sm focus:ring-2 focus:ring-red-500 border outline-none font-bold">
                                <option value="">Select Reason...</option>
                                <option value="Sick/Health Issue" ${currentReason==='Sick/Health Issue'?'selected':''}>Sick / Health Issue</option>
                                <option value="Family Emergency" ${currentReason==='Family Emergency'?'selected':''}>Family Emergency</option>
                                <option value="Travel/Out of Town" ${currentReason==='Travel/Out of Town'?'selected':''}>Travel / Out of Town</option>
                                <option value="Uninformed" ${currentReason==='Uninformed'?'selected':''}>Uninformed</option>
                                <option value="Other" ${currentReason==='Other'?'selected':''}>Other</option>
                            </select>
                        </div>`;
                    }

                    return `
                    <div class="p-4 flex flex-col xl:flex-row xl:justify-between xl:items-center hover:bg-slate-50 rounded-xl transition-colors gap-3 md:gap-4 border-b border-slate-100 last:border-0">
                        <div class="flex items-center space-x-3 md:space-x-4">
                            <div class="w-10 h-10 md:w-12 md:h-12 bg-slate-200 rounded-full flex items-center justify-center text-slate-600 font-extrabold text-lg md:text-xl shadow-inner border border-slate-300 flex-shrink-0">${std.name.charAt(0)}</div>
                            <div class="truncate">
                                <p class="font-extrabold text-slate-800 text-base md:text-lg truncate">${std.name}</p>
                                <div class="flex items-center mt-0.5 space-x-3">
                                    <p class="text-xs md:text-sm font-mono text-slate-500 font-bold">ID: ${std.id}</p>
                                    <button onclick="window.openIndividualReport('${std.id}')" class="text-[10px] md:text-xs text-blue-600 hover:text-blue-800 font-bold flex items-center bg-blue-50 px-2 py-0.5 rounded border border-blue-200 transition-colors">
                                        <i data-lucide="calendar-days" class="w-3 h-3 mr-1"></i> Individual Report
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row items-end sm:items-center gap-2 md:gap-3 w-full xl:w-auto mt-2 xl:mt-0">
                            <div class="flex bg-slate-100 p-1.5 rounded-xl border border-slate-200 shadow-sm w-full sm:w-auto">
                                <button onclick="window.toggleAttendance('${std.id}', 'Present')" class="flex-1 sm:flex-none px-4 md:px-8 py-2 md:py-2.5 rounded-lg font-bold transition-all text-xs md:text-sm ${currentStatus === 'Present' ? 'bg-green-500 text-white shadow-md' : 'text-slate-500 hover:text-green-600 hover:bg-green-50'}">Present</button>
                                <button onclick="window.toggleAttendance('${std.id}', 'Absent')" class="flex-1 sm:flex-none px-4 md:px-8 py-2 md:py-2.5 rounded-lg font-bold transition-all text-xs md:text-sm ${currentStatus === 'Absent' ? 'bg-red-500 text-white shadow-md' : 'text-slate-500 hover:text-red-600 hover:bg-red-50'}">Absent</button>
                            </div>
                            ${reasonHTML}
                        </div>
                    </div>`;
                }).join('');

                if(filteredStudents.length === 0) stdRows = `<div class="p-8 text-center text-slate-500 font-medium text-sm md:text-base">No students found in this batch based on your filters.</div>`;

                displayHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-fade-in w-full overflow-x-auto">
                    <div class="p-4 md:p-6 bg-slate-900 flex flex-col sm:flex-row sm:justify-between sm:items-center text-white gap-4">
                        <div>
                            <h3 class="font-bold text-lg md:text-xl text-orange-400">${state.attSelectedBatch}</h3>
                            <p class="text-slate-300 text-xs md:text-sm font-medium mt-1">Total: ${filteredStudents.length} | Marked Present: <span class="text-green-400">${presentCount}</span> | Marked Absent: <span class="text-red-400">${absentCount}</span></p>
                        </div>
                        <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-3 w-full sm:w-auto">
                            <button onclick="window.openAttendanceReport()" class="w-full sm:w-auto bg-slate-700 text-white border border-slate-600 px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-600 flex items-center justify-center transition-colors shadow-sm">

        // --- ATTENDANCE REPORT TEMPLATE (Printable) ---
        function AttendanceReportViewTemplate() {
            const data = state.attendanceReportData;
            const formattedMonth = new Date(data.month + '-01').toLocaleString('en-IN', { month: 'long', year: 'numeric' });
            
            const [year, month] = data.month.split('-');
            const prefix = `${year}-${month}-`;
            const validDates = Object.keys(data.state).filter(k => k.startsWith(prefix));

            let stdHTML = data.students.map((std, index) => {
                let p = 0, a = 0;
                validDates.forEach(date => {
                    const attKey = `${std.id}_${data.batch}`;
                    const st = data.state[date]?.[attKey]?.status || data.state[date]?.[std.id]?.status;
                    if(st === 'Present') p++;
                    if(st === 'Absent') a++;
                });
                const totalWorkingDays = p + a;
                const percentage = totalWorkingDays > 0 ? Math.round((p / totalWorkingDays) * 100) : 0;
                
                return `
                <tr class="border-b border-slate-200 text-xs md:text-sm">
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-bold text-slate-500">${index + 1}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 font-mono font-bold text-slate-600">${std.id}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 font-extrabold text-slate-900">${std.name}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-bold text-slate-700">${totalWorkingDays}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-extrabold text-green-600">${p}</td>
                    <td class="p-2 md:p-3.5 border-r border-slate-300 text-center font-bold text-red-500">${a}</td>
                    <td class="p-2 md:p-3.5 text-center">
                        <span class="px-2 md:px-3 py-1 rounded-full text-[10px] md:text-xs font-extrabold tracking-wide ${percentage >= 75 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${percentage}%</span>
                    </td>
                </tr>`;
            }).join('');
